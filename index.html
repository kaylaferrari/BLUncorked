<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BLUncorked</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-wrapper">

        <!-- ═══ THREE.JS CANVAS (fills game scene area) ═══ -->
        <canvas id="three-canvas"></canvas>

        <!-- ═══ PLAYER AVATAR (DOM overlay, positioned by JS from 3D projection) ═══ -->
        <div id="player-avatar" data-facing="right" data-state="idle">
            <video id="avatar-video"
                   src="I_need_the_young_man_avatar_st.mp4"
                   muted playsinline preload="auto"
                   crossorigin="anonymous"
                   style="display:none; position:absolute; pointer-events:none;">
            </video>
            <canvas id="avatar-canvas" width="90" height="160"></canvas>
            <div id="avatar-shadow"></div>
            <div class="avatar-label">You</div>
        </div>

        <!-- ═══ ZONE BANNER (proximity notification) ═══ -->
        <div id="zone-banner" class="hidden">
            <span id="zone-banner-icon"></span>
            <span id="zone-banner-name"></span>
            <span id="zone-banner-hint">Press E or click to interact</span>
        </div>

        <!-- ═══ INTERACT PROMPT ═══ -->
        <div id="interact-prompt" class="hidden">[ E ] Interact</div>

        <!-- ═══ MINIMAP ═══ -->
        <canvas id="minimap"></canvas>

        <!-- ═══ UI BAR ═══ -->
        <div id="ui-bar">
            <div class="action-buttons">
                <button id="btn-look" class="active">Look</button>
                <button id="btn-take">Take</button>
                <button id="btn-talk">Talk</button>
                <button id="btn-use">Use</button>
            </div>
            <div id="floor-indicator">
                <span id="floor-label">Upper Bar</span>
                <div id="floor-arrows">
                    <button id="btn-up" class="floor-btn" title="Go up" disabled>▲</button>
                    <button id="btn-down" class="floor-btn" title="Go down">▼</button>
                </div>
            </div>
            <div class="inventory-slots">
                <div class="slot" id="slot-0"></div>
                <div class="slot" id="slot-1"></div>
                <div class="slot" id="slot-2"></div>
                <div class="slot" id="slot-3"></div>
                <div class="slot" id="slot-4"></div>
                <button id="btn-scan-wine" title="Scan a wine label">🍷 Scan Wine</button>
            </div>
        </div>

        <!-- ═══ DIALOGUE BOX ═══ -->
        <div id="dialogue-box" class="hidden"></div>

        <!-- ═══ SOMMELIER DIALOGUE PANEL ═══ -->
        <div id="dialogue-panel" class="panel hidden">
            <div class="panel-header">
                <span class="panel-avatar">🧔</span>
                <span id="dialogue-speaker">The Sommelier</span>
                <button class="panel-close" data-panel="dialogue-panel">✕</button>
            </div>
            <div id="dialogue-text"></div>
            <div id="dialogue-choices"></div>
        </div>

        <!-- ═══ ZONE CONTENT PANEL ═══ -->
        <div id="zone-panel" class="panel hidden">
            <div class="panel-header">
                <span id="zone-panel-icon"></span>
                <span id="zone-panel-title"></span>
                <button class="panel-close" data-panel="zone-panel">✕</button>
            </div>
            <div id="zone-panel-body"></div>
        </div>

        <!-- ═══ WINE SCANNER PANEL ═══ -->
        <div id="scanner-panel" class="panel hidden">
            <div class="panel-header">
                <span class="panel-avatar">🍷</span>
                <span>Wine Scanner</span>
                <button class="panel-close" data-panel="scanner-panel">✕</button>
            </div>
            <div id="scanner-panel-body">
                <iframe id="scanner-frame" src="wine-scanner.html" frameborder="0"
                        style="width:100%;height:520px;border:none;border-radius:0 0 12px 12px;background:#0d0608;">
                </iframe>
            </div>
        </div>

        <!-- ═══ CONTROLS HINT (fades after first move) ═══ -->
        <div id="controls-hint">WASD or click to walk · E to interact · Q/R rotate camera</div>

        <!-- ═══ SCENE TRANSITION OVERLAY ═══ -->
        <div id="transition-overlay"></div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
