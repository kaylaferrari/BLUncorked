<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BLUncorked — Wine Cellar</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { background: #0d0602; overflow: hidden; }
      canvas { display: block; }
      #ui {
        position: fixed;
        bottom: 24px;
        left: 50%;
        transform: translateX(-50%);
        color: #c8a46a;
        font-family: 'Georgia', serif;
        font-size: 13px;
        letter-spacing: 0.15em;
        text-transform: uppercase;
        opacity: 0.7;
        pointer-events: none;
        text-shadow: 0 0 12px rgba(200,164,106,0.5);
      }
      #loader {
        position: fixed;
        inset: 0;
        background: #0d0602;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 16px;
        z-index: 100;
        transition: opacity 0.8s ease;
      }
      #loader h1 {
        color: #c8a46a;
        font-family: 'Georgia', serif;
        font-size: 28px;
        letter-spacing: 0.3em;
        font-weight: normal;
      }
      #loader .bar {
        width: 200px;
        height: 1px;
        background: #2a1610;
        position: relative;
        overflow: hidden;
      }
      #loader .fill {
        position: absolute;
        height: 100%;
        background: #c8a46a;
        width: 0%;
        transition: width 0.3s ease;
        box-shadow: 0 0 8px #ffbe6a;
      }
    </style>
  </head>
  <body>
    <div id="loader">
      <h1>BL Uncorked</h1>
      <div class="bar"><div class="fill" id="fill"></div></div>
    </div>
    <div id="ui">Drag to explore &nbsp;·&nbsp; Scroll to zoom</div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
