<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>BL Uncorked — Wine Cellar</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0D0602;overflow:hidden;font-family:Georgia,serif}
canvas{display:block}
#logo{position:fixed;top:20px;left:24px;color:#c8a46a;font-size:14px;
  letter-spacing:.3em;text-transform:uppercase;opacity:.85;pointer-events:none;
  text-shadow:0 0 16px rgba(200,164,106,.4)}
#ui{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
  color:#c8a46a;font-size:11px;letter-spacing:.18em;text-transform:uppercase;
  opacity:.55;pointer-events:none}
#hotlabel{display:none;position:fixed;background:rgba(13,6,2,.92);color:#c8a46a;
  border:1px solid rgba(200,164,106,.5);font-size:11px;letter-spacing:.12em;
  text-transform:uppercase;padding:5px 14px;border-radius:2px;pointer-events:none;
  transform:translate(-50%,-120%);white-space:nowrap;
  text-shadow:0 0 8px rgba(200,164,106,.3)}
#dialog{display:none;position:fixed;bottom:64px;left:50%;transform:translateX(-50%);
  width:min(580px,90vw);background:rgba(13,6,2,.95);border:1px solid #c8a46a;
  border-radius:3px;padding:20px 26px 16px;color:#e8d5b0;
  box-shadow:0 0 32px rgba(200,164,106,.15);opacity:0;transition:opacity .3s;z-index:20}
#dialog.visible{opacity:1}
#dlg-speaker{color:#c8a46a;font-size:10px;letter-spacing:.28em;text-transform:uppercase;margin-bottom:10px}
#dlg-text{font-size:14px;line-height:1.7}
#dlg-close{margin-top:14px;float:right;background:transparent;color:#c8a46a;
  border:1px solid rgba(200,164,106,.5);font-family:Georgia,serif;font-size:10px;
  letter-spacing:.12em;text-transform:uppercase;padding:5px 14px;cursor:pointer;
  border-radius:2px;transition:background .2s}
#dlg-close:hover{background:rgba(200,164,106,.2)}
#loader{position:fixed;inset:0;background:#0D0602;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:18px;z-index:100;transition:opacity .9s ease}
#loader h1{color:#c8a46a;font-size:24px;letter-spacing:.4em;font-weight:normal}
#loader p{color:rgba(200,164,106,.4);font-size:10px;letter-spacing:.22em;text-transform:uppercase}
.bar{width:180px;height:1px;background:#2a1610;position:relative;overflow:hidden}
.fill{position:absolute;height:100%;background:#c8a46a;width:0%;transition:width .3s ease;
  box-shadow:0 0 6px #ffbe6a}
</style>
</head>
<body>
<div id="loader">
  <h1>BL Uncorked</h1>
  <div class="bar"><div class="fill" id="fill"></div></div>
  <p>Preparing the cellar&hellip;</p>
</div>
<canvas id="c"></canvas>
<div id="logo">BL Uncorked</div>
<div id="ui">Click to move</div>
<div id="hotlabel"></div>
<div id="dialog">
  <div id="dlg-speaker"></div>
  <div id="dlg-text"></div>
  <button id="dlg-close">Close</button>
</div>

<script>
// ── canvas + resize ───────────────────────────────────────────────────
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
let W, H, FLOOR_Y, CEIL_Y;

function resize() {
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
  FLOOR_Y = H * 0.76;
  CEIL_Y  = H * 0.06;
}
resize();
window.addEventListener('resize', () => {
  resize();
  player.x = Math.min(player.x, WALK_MAX_X());
});

// ── helpers ───────────────────────────────────────────────────────────
function lerp(a, b, t) { return a + (b - a) * t; }
function rng(n) { return Math.abs((Math.sin(n * 127.1 + 311.7) * 43758.5) % 1); }
const WALK_MIN_X = () => W * 0.05;
const WALK_MAX_X = () => W * 0.60;

// ── candle flicker state ──────────────────────────────────────────────
const flickers = Array.from({length: 16}, (_, i) => ({
  phase: rng(i) * Math.PI * 2,
  speed: 2.2 + rng(i + 100) * 2.2,
}));
function flick(i, t) { return 0.72 + Math.sin(t * flickers[i % 16].speed + flickers[i % 16].phase) * 0.28; }

// ── game state ────────────────────────────────────────────────────────
let elapsed = 0;
const WALK_SPEED = 200;

const player = {
  x: W * 0.32,
  targetX: null,
  facing: 1,
  state: 'idle',
  animTime: 0,
  interactTimer: 0,
};
const npc = { animTime: 0, state: 'idle' };

// ── dialog ────────────────────────────────────────────────────────────
const dialogEl   = document.getElementById('dialog');
const dlgSpeaker = document.getElementById('dlg-speaker');
const dlgText    = document.getElementById('dlg-text');
const dlgClose   = document.getElementById('dlg-close');
let activeDialog = false, dlgList = [], dlgIdx = 0, dlgSpeakerStr = '';

function showDialog(speaker, dialogs, idx) {
  dlgSpeakerStr = speaker || '';
  dlgList = dialogs; dlgIdx = idx;
  dlgSpeaker.textContent = speaker ? speaker.toUpperCase() : '';
  dlgText.textContent    = dialogs[idx] || '';
  dlgClose.textContent   = idx + 1 < dialogs.length ? 'Next' : 'Close';
  dialogEl.style.display = 'block';
  requestAnimationFrame(() => dialogEl.classList.add('visible'));
  activeDialog = true;
}
function closeDialog() {
  dialogEl.classList.remove('visible');
  setTimeout(() => { dialogEl.style.display = 'none'; }, 300);
  activeDialog = false;
  if (player.state !== 'walk') player.state = 'idle';
}
dlgClose.addEventListener('click', () => {
  if (dlgIdx + 1 < dlgList.length) showDialog(dlgSpeakerStr, dlgList, dlgIdx + 1);
  else closeDialog();
});

// ── hotspots ──────────────────────────────────────────────────────────
const hotspots = [
  {
    id: 'sommelier',
    label: '\u{1F4AC} Talk to Sommelier',
    xFrac: 0.72,
    approachX: () => W * 0.60,
    hoverW: () => W * 0.14,
    speaker: 'Sommelier',
    dialogs: [
      "Good evening. May I suggest our 2019 Volta Rouge? A stunning barrel-select.",
      "The cellar maintains 13°C year-round. Perfect for long-term ageing.",
      "We have a private tasting downstairs if you'd like to reserve a table.",
    ],
    interactState: 'talk',
  },
  {
    id: 'niche',
    label: '\u{1F441} Examine Niche',
    xFrac: 0.09,
    approachX: () => W * 0.14,
    hoverW: () => W * 0.08,
    speaker: null,
    dialogs: ["A votive candle flickers in the arched niche. Centuries of wax have built up on the stone ledge."],
    interactState: 'examine',
  },
  {
    id: 'grate',
    label: '\u{1F50D} Look Down',
    xFrac: 0.42,
    approachX: () => W * 0.40,
    hoverW: () => W * 0.08,
    speaker: null,
    dialogs: ["Through the iron grate, candlelight flickers across crystal glassware in the private tasting room below."],
    interactState: 'examine',
  },
];

function getHotspotAt(mx, my) {
  if (my < FLOOR_Y * 0.3 || my > H * 0.95) return null;
  for (const hs of hotspots) {
    const hx = hs.xFrac * W;
    if (Math.abs(mx - hx) < hs.hoverW() && my > FLOOR_Y - H * 0.35 && my < H * 0.92) return hs;
  }
  return null;
}

function triggerHotspot(hs) {
  player.targetX = hs.approachX();
  player.facing  = hs.xFrac > player.x / W ? 1 : -1;
  player.state   = 'walk';
  const chk = setInterval(() => {
    if (Math.abs(player.x - hs.approachX()) < 24) {
      clearInterval(chk);
      player.targetX = null;
      player.state = hs.interactState;
      player.interactTimer = 99;
      player.facing = hs.xFrac > 0.5 ? 1 : -1;
      showDialog(hs.speaker, hs.dialogs, 0);
    }
  }, 80);
}

// ── click indicator ───────────────────────────────────────────────────
let clickInd = null;

// ── input ─────────────────────────────────────────────────────────────
const hotlabelEl = document.getElementById('hotlabel');
let hoveredHs = null;

canvas.addEventListener('mousemove', e => {
  if (activeDialog) return;
  const hs = getHotspotAt(e.clientX, e.clientY);
  hoveredHs = hs;
  if (hs) {
    hotlabelEl.textContent = hs.label;
    hotlabelEl.style.display = 'block';
    hotlabelEl.style.left = e.clientX + 'px';
    hotlabelEl.style.top  = e.clientY + 'px';
    canvas.style.cursor = 'pointer';
  } else {
    hotlabelEl.style.display = 'none';
    canvas.style.cursor = '';
  }
});

canvas.addEventListener('click', e => {
  if (activeDialog) return;
  const hs = getHotspotAt(e.clientX, e.clientY);
  if (hs) { triggerHotspot(hs); return; }
  const tx = Math.max(WALK_MIN_X(), Math.min(WALK_MAX_X(), e.clientX));
  player.targetX = tx;
  player.facing  = tx > player.x ? 1 : -1;
  player.state   = 'walk';
  player.interactTimer = 0;
  clickInd = { x: tx, age: 0 };
});

// ── drawing ───────────────────────────────────────────────────────────

function drawBackground() {
  const g = ctx.createLinearGradient(0, 0, 0, FLOOR_Y);
  g.addColorStop(0,   '#0D0602');
  g.addColorStop(0.4, '#180A03');
  g.addColorStop(1,   '#1C0D05');
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, W, FLOOR_Y);
}

function drawBrickRect(x, y, w, h) {
  const bW = Math.round(W * 0.038), bH = Math.round(H * 0.024);
  ctx.save();
  ctx.beginPath(); ctx.rect(x, y, w, h); ctx.clip();
  for (let row = 0; row * bH < h + bH; row++) {
    const off = (row % 2) * (bW / 2);
    for (let col = -1; col * bW < w + bW; col++) {
      const bx = x + col * bW + off, by = y + row * bH;
      const s = 0.78 + rng(row * 97 + col * 13) * 0.32;
      ctx.fillStyle = `rgb(${~~(118*s)},${~~(54*s)},${~~(32*s)})`;
      ctx.fillRect(bx + 1, by + 1, bW - 2, bH - 2);
    }
  }
  ctx.restore();
}

function drawVault() {
  const archCount = 4;
  const archW = W / archCount;
  const archMidY = CEIL_Y + archW * 0.42;

  for (let i = 0; i < archCount; i++) {
    const cx   = i * archW + archW / 2;
    const botY = CEIL_Y + archW * 0.9;

    // Arch fill
    ctx.save();
    ctx.beginPath();
    ctx.moveTo(i * archW, botY);
    ctx.lineTo(i * archW, archMidY);
    ctx.arc(cx, archMidY, archW / 2, Math.PI, 0);
    ctx.lineTo((i + 1) * archW, botY);
    ctx.closePath();
    const ag = ctx.createRadialGradient(cx, archMidY, archW * 0.1, cx, botY, archW * 0.75);
    ag.addColorStop(0, '#9A5030');
    ag.addColorStop(0.5, '#7A3C25');
    ag.addColorStop(1, '#4A2010');
    ctx.fillStyle = ag;
    ctx.fill();
    ctx.restore();

    // Rib outline
    ctx.save();
    ctx.beginPath();
    ctx.moveTo(i * archW, botY);
    ctx.lineTo(i * archW, archMidY);
    ctx.arc(cx, archMidY, archW / 2, Math.PI, 0);
    ctx.lineTo((i + 1) * archW, botY);
    ctx.strokeStyle = '#3A1808';
    ctx.lineWidth = 5;
    ctx.stroke();
    ctx.restore();

    // Keystone
    const ky = archMidY - archW / 2;
    ctx.fillStyle = '#A05535';
    ctx.beginPath();
    ctx.moveTo(cx - W * 0.012, ky - H * 0.006);
    ctx.lineTo(cx + W * 0.012, ky - H * 0.006);
    ctx.lineTo(cx + W * 0.008, ky + H * 0.016);
    ctx.lineTo(cx - W * 0.008, ky + H * 0.016);
    ctx.closePath();
    ctx.fill();

    // String lights along arch
    const steps = 12;
    for (let j = 1; j < steps; j++) {
      const t  = (j / steps) * Math.PI;
      const lx = cx - Math.cos(t) * archW / 2;
      const ly = archMidY - Math.sin(t) * archW / 2;
      const br = flick(i * steps + j, elapsed);
      // Cord
      if (j < steps - 1) {
        const t2  = ((j + 1) / steps) * Math.PI;
        const lx2 = cx - Math.cos(t2) * archW / 2;
        const ly2 = archMidY - Math.sin(t2) * archW / 2;
        ctx.strokeStyle = 'rgba(40,20,10,0.7)';
        ctx.lineWidth = 1;
        ctx.beginPath(); ctx.moveTo(lx, ly); ctx.lineTo(lx2, ly2); ctx.stroke();
      }
      // Bulb
      const r = H * 0.004;
      ctx.beginPath();
      ctx.arc(lx, ly, r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(255,${~~(190 + 65 * br)},${~~(90 * br)},${br})`;
      ctx.fill();
      // Glow
      const gg = ctx.createRadialGradient(lx, ly, 0, lx, ly, r * 6);
      gg.addColorStop(0, `rgba(255,180,80,${0.18 * br})`);
      gg.addColorStop(1, 'rgba(255,160,60,0)');
      ctx.fillStyle = gg;
      ctx.beginPath(); ctx.arc(lx, ly, r * 6, 0, Math.PI * 2); ctx.fill();
    }
  }

  // Back wall brick below arches
  drawBrickRect(0, CEIL_Y + archW * 0.88, W, FLOOR_Y - CEIL_Y - archW * 0.88);
}

function drawFloor() {
  // Base floor colour
  const fg = ctx.createLinearGradient(0, FLOOR_Y, 0, H);
  fg.addColorStop(0, '#5A3818');
  fg.addColorStop(1, '#2A1808');
  ctx.fillStyle = fg;
  ctx.fillRect(0, FLOOR_Y, W, H - FLOOR_Y);

  // Perspective plank lines
  const vpx = W / 2, vpy = FLOOR_Y - H * 0.15;
  ctx.strokeStyle = 'rgba(0,0,0,0.22)';
  ctx.lineWidth = 1;
  const planks = 20;
  for (let i = 0; i <= planks; i++) {
    const bx = (i / planks) * W;
    ctx.beginPath();
    ctx.moveTo(bx, H);
    ctx.lineTo(vpx + (bx - vpx) * 0.08, FLOOR_Y);
    ctx.stroke();
  }
  for (let i = 0; i <= 5; i++) {
    const t = i / 5;
    const y = lerp(H, FLOOR_Y, t * t);
    ctx.beginPath();
    ctx.moveTo(lerp(0, vpx * 0.12, 1 - t), y);
    ctx.lineTo(lerp(W, vpx + (W - vpx) * 0.12, 1 - t), y);
    ctx.stroke();
  }

  // Floor-wall shadow
  const sh = ctx.createLinearGradient(0, FLOOR_Y - H * 0.03, 0, FLOOR_Y + H * 0.03);
  sh.addColorStop(0, 'rgba(0,0,0,0.55)');
  sh.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = sh;
  ctx.fillRect(0, FLOOR_Y - H * 0.03, W, H * 0.06);
}

function drawNiches() {
  const niches = [{ xf: 0.06 }, { xf: 0.13 }];
  niches.forEach((n, ni) => {
    const nx = W * n.xf;
    const nw = W * 0.06, nh = H * 0.22;
    const ny = FLOOR_Y - nh - H * 0.04;
    const nr = nw / 2;

    // Niche cavity
    ctx.fillStyle = '#1A0A04';
    ctx.beginPath();
    ctx.moveTo(nx - nr, ny + nh);
    ctx.lineTo(nx - nr, ny + nr);
    ctx.arc(nx, ny + nr, nr, Math.PI, 0);
    ctx.lineTo(nx + nr, ny + nh);
    ctx.closePath();
    ctx.fill();

    // Niche glow
    const br = flick(ni * 4, elapsed);
    const ng = ctx.createRadialGradient(nx, ny + nh * 0.7, 0, nx, ny + nh * 0.7, nw * 0.9);
    ng.addColorStop(0, `rgba(255,150,50,${0.4 * br})`);
    ng.addColorStop(1, 'rgba(255,100,20,0)');
    ctx.fillStyle = ng;
    ctx.beginPath(); ctx.arc(nx, ny + nh * 0.7, nw * 0.9, 0, Math.PI * 2); ctx.fill();

    // Candle stick
    const cStick = H * 0.006;
    ctx.fillStyle = '#E8D5B0';
    ctx.fillRect(nx - cStick, ny + nh - H * 0.06, cStick * 2, H * 0.055);

    // Flame
    const fBr = flick(ni * 4 + 1, elapsed);
    const fH = H * 0.028 * fBr, fW = W * 0.006;
    ctx.save();
    ctx.translate(nx, ny + nh - H * 0.06);
    // outer flame
    ctx.beginPath();
    ctx.ellipse(0, -fH * 0.6, fW * 0.9, fH, 0, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(255,110,20,${0.92 * fBr})`;
    ctx.fill();
    // inner flame
    ctx.beginPath();
    ctx.ellipse(0, -fH * 0.5, fW * 0.5, fH * 0.65, 0, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(255,220,120,${fBr})`;
    ctx.fill();
    ctx.restore();

    // Flame halo
    const fgG = ctx.createRadialGradient(nx, ny + nh - H * 0.08, 0, nx, ny + nh - H * 0.08, W * 0.04);
    fgG.addColorStop(0, `rgba(255,140,40,${0.25 * fBr})`);
    fgG.addColorStop(1, 'rgba(255,100,20,0)');
    ctx.fillStyle = fgG;
    ctx.beginPath(); ctx.arc(nx, ny + nh - H * 0.08, W * 0.04, 0, Math.PI * 2); ctx.fill();

    // Niche edge
    ctx.strokeStyle = '#3A1A0A';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(nx - nr, ny + nh);
    ctx.lineTo(nx - nr, ny + nr);
    ctx.arc(nx, ny + nr, nr, Math.PI, 0);
    ctx.lineTo(nx + nr, ny + nh);
    ctx.stroke();
  });
}

const WINE_NAMES = ['BL','CAVE','VOLTA','ARCO','CELLAR'];
const GLASS_COLS = ['#1A3A1A','#4A2A0A','#8B1A1A','#2A3A4A','#3A2A1A'];
const FOIL_COLS  = ['#1A1A1A','#8B1A1A','#C8A060','#1A3A1A'];

function drawBar() {
  const bx  = W * 0.60;
  const bw  = W * 0.40;
  const cY  = FLOOR_Y - H * 0.12;  // counter top Y
  const cH  = H * 0.12;            // counter height
  const shY = CEIL_Y + H * 0.14;   // top of shelving area

  // Back wall panel, lit warm
  const bwg = ctx.createLinearGradient(bx, 0, W, 0);
  bwg.addColorStop(0, '#1C0A04');
  bwg.addColorStop(1, '#281005');
  ctx.fillStyle = bwg;
  ctx.fillRect(bx, CEIL_Y + H * 0.12, bw, FLOOR_Y - CEIL_Y - H * 0.12);

  // Back-lit glow panel
  const blH = cY - shY - H * 0.02;
  const blg = ctx.createLinearGradient(0, shY, 0, shY + blH);
  blg.addColorStop(0, 'rgba(255,210,90,0.16)');
  blg.addColorStop(0.5, 'rgba(255,195,70,0.22)');
  blg.addColorStop(1, 'rgba(255,170,50,0.08)');
  ctx.fillStyle = blg;
  ctx.fillRect(bx + W * 0.02, shY, bw - W * 0.02, blH);

  // Shelves + bottles
  const SHELF_COUNT = 4;
  for (let s = 0; s < SHELF_COUNT; s++) {
    const sy = shY + (s + 1) * (blH / (SHELF_COUNT + 0.6));

    // Shelf plank
    ctx.fillStyle = '#2A1008';
    ctx.fillRect(bx + W * 0.02, sy, bw - W * 0.03, H * 0.006);

    // Bottles
    const bottleW = W * 0.014;
    const count   = Math.floor((bw - W * 0.04) / bottleW);
    for (let b = 0; b < count; b++) {
      const btx = bx + W * 0.025 + b * bottleW + bottleW / 2;
      const bty = sy - H * 0.085;
      const col = GLASS_COLS[(s * 7 + b) % GLASS_COLS.length];

      // Body
      ctx.fillStyle = col;
      ctx.beginPath();
      ctx.roundRect(btx - bottleW * 0.36, bty, bottleW * 0.72, H * 0.065, 2);
      ctx.fill();
      // Neck
      ctx.beginPath();
      ctx.roundRect(btx - bottleW * 0.2, bty - H * 0.025, bottleW * 0.4, H * 0.028, 1);
      ctx.fill();
      // Foil
      ctx.fillStyle = FOIL_COLS[(s + b) % 4];
      ctx.fillRect(btx - bottleW * 0.22, bty - H * 0.028, bottleW * 0.44, H * 0.01);

      // Label on every 3rd bottle
      if (b % 3 === 0) {
        ctx.fillStyle = 'rgba(238,222,185,0.88)';
        ctx.fillRect(btx - bottleW * 0.3, bty + H * 0.016, bottleW * 0.6, H * 0.028);
        ctx.fillStyle = '#2A1008';
        ctx.font = `bold ${Math.max(6, ~~(H * 0.009))}px Georgia,serif`;
        ctx.textAlign = 'center';
        ctx.fillText(WINE_NAMES[(s + ~~(b / 3)) % WINE_NAMES.length], btx, bty + H * 0.031);
      }
    }
  }

  // Counter body
  ctx.fillStyle = '#3D2010';
  ctx.fillRect(bx, cY, bw, cH);

  // Counter top
  const ctg = ctx.createLinearGradient(0, cY - H * 0.008, 0, cY);
  ctg.addColorStop(0, '#D4B07A');
  ctg.addColorStop(1, '#C8A46A');
  ctx.fillStyle = ctg;
  ctx.fillRect(bx - W * 0.003, cY - H * 0.008, bw + W * 0.003, H * 0.01);

  // Counter panel trim
  ctx.strokeStyle = 'rgba(200,164,106,0.25)';
  ctx.lineWidth = 1;
  const panels = 4, pw = bw / panels;
  for (let p = 0; p < panels; p++) {
    const px = bx + p * pw + W * 0.008;
    ctx.strokeRect(px, cY + H * 0.012, pw - W * 0.016, cH - H * 0.024);
  }

  // Wine glasses on counter
  for (let g = 0; g < 4; g++) {
    drawWineGlass(bx + W * 0.04 + g * W * 0.055, cY, g % 2 === 0 ? 0.2 : 0);
  }

  // Bar point light glow
  const bpl = ctx.createRadialGradient(W * 0.8, cY - H * 0.05, 0, W * 0.8, cY - H * 0.05, W * 0.25);
  bpl.addColorStop(0, 'rgba(255,220,100,0.1)');
  bpl.addColorStop(1, 'rgba(255,200,80,0)');
  ctx.fillStyle = bpl;
  ctx.fillRect(bx, CEIL_Y, bw, FLOOR_Y - CEIL_Y);
}

function drawWineGlass(x, baseY, fill) {
  const gh = H * 0.068, gw = W * 0.018;
  ctx.save();
  ctx.strokeStyle = 'rgba(200,185,155,0.65)';
  ctx.lineWidth   = 1.5;
  // Bowl
  ctx.beginPath();
  ctx.moveTo(x - gw, baseY - gh);
  ctx.quadraticCurveTo(x - gw * 1.2, baseY - gh * 0.5, x - gw * 0.45, baseY - gh * 0.28);
  ctx.lineTo(x + gw * 0.45, baseY - gh * 0.28);
  ctx.quadraticCurveTo(x + gw * 1.2, baseY - gh * 0.5, x + gw, baseY - gh);
  ctx.closePath();
  ctx.stroke();
  if (fill > 0) {
    ctx.fillStyle = `rgba(140,15,15,${fill * 0.7})`;
    ctx.fill();
  }
  // Stem
  ctx.beginPath(); ctx.moveTo(x, baseY - gh * 0.28); ctx.lineTo(x, baseY); ctx.stroke();
  // Base
  ctx.beginPath(); ctx.moveTo(x - gw * 0.85, baseY); ctx.lineTo(x + gw * 0.85, baseY); ctx.stroke();
  ctx.restore();
}

function drawGrate() {
  const gx = W * 0.42, gy = FLOOR_Y + H * 0.035;
  const grx = W * 0.038, gry = grx * 0.38;

  // Under-glow
  const ugg = ctx.createRadialGradient(gx, gy, 0, gx, gy, grx * 3);
  ugg.addColorStop(0, 'rgba(255,110,30,0.28)');
  ugg.addColorStop(1, 'rgba(255,80,10,0)');
  ctx.fillStyle = ugg;
  ctx.beginPath(); ctx.ellipse(gx, gy, grx * 3, gry * 3, 0, 0, Math.PI * 2); ctx.fill();

  // Iron frame
  ctx.strokeStyle = '#2A1A0E';
  ctx.lineWidth   = 3;
  ctx.beginPath(); ctx.ellipse(gx, gy, grx, gry, 0, 0, Math.PI * 2); ctx.stroke();

  // Grid bars
  ctx.lineWidth = 2;
  for (let i = -3; i <= 3; i++) {
    ctx.beginPath();
    ctx.moveTo(gx + (i / 3) * grx, gy - gry);
    ctx.lineTo(gx + (i / 3) * grx, gy + gry);
    ctx.stroke();
  }
  for (let i = -1; i <= 1; i++) {
    ctx.beginPath();
    ctx.moveTo(gx - grx, gy + (i / 1.5) * gry * 0.7);
    ctx.lineTo(gx + grx, gy + (i / 1.5) * gry * 0.7);
    ctx.stroke();
  }
}

function drawCharacter(cx, facing, state, animT, isSommelier) {
  const ch   = H * 0.17;
  const cw   = ch * 0.24;
  const cy   = FLOOR_Y;

  const skin  = isSommelier ? '#D4A882' : '#C8956A';
  const shirt = isSommelier ? '#E8E8E8' : '#E8DDD0';
  const vest  = isSommelier ? '#1A1A2A' : '#5A3018';
  const pants = isSommelier ? '#0A0A1A' : '#2A2018';
  const boots = '#1A1008';
  const hair  = isSommelier ? '#1A0E0E' : '#2A1808';

  // Walk cycle
  let legSwing = 0, armSwing = 0, bob = 0;
  if (state === 'walk') {
    const wp = animT * 8;
    legSwing  = Math.sin(wp) * 0.38;
    armSwing  = -Math.sin(wp) * 0.28;
    bob       = Math.abs(Math.sin(wp)) * ch * 0.01;
  } else if (state === 'idle') {
    bob = Math.sin(animT * 1.4) * ch * 0.005;
  } else if (state === 'talk') {
    armSwing = Math.sin(animT * 3) * 0.1;
    bob = Math.sin(animT * 2) * ch * 0.004;
  }

  ctx.save();
  ctx.translate(cx, cy - bob);
  ctx.scale(facing, 1);

  // Legs
  const legLen = ch * 0.32, kneeLen = ch * 0.16;
  [[-cw * 0.55, -legSwing], [cw * 0.55, legSwing]].forEach(([lx, sw]) => {
    ctx.save();
    ctx.translate(lx, -ch * 0.21);
    ctx.rotate(sw);
    // Thigh
    ctx.fillStyle = pants;
    ctx.beginPath(); ctx.roundRect(-cw * 0.34, 0, cw * 0.68, legLen, 3); ctx.fill();
    // Shin
    ctx.translate(0, legLen);
    ctx.rotate(Math.max(0, -sw) * 0.7);
    ctx.fillStyle = pants;
    ctx.beginPath(); ctx.roundRect(-cw * 0.28, 0, cw * 0.56, kneeLen, 2); ctx.fill();
    // Boot
    ctx.translate(0, kneeLen);
    ctx.fillStyle = boots;
    ctx.beginPath(); ctx.roundRect(-cw * 0.3, 0, cw * 0.75, ch * 0.07, 3); ctx.fill();
    ctx.restore();
  });

  // Torso
  ctx.fillStyle = shirt;
  ctx.beginPath(); ctx.roundRect(-cw * 0.9, -ch * 0.6, cw * 1.8, ch * 0.4, 4); ctx.fill();
  ctx.fillStyle = vest;
  ctx.beginPath(); ctx.roundRect(-cw * 0.85, -ch * 0.58, cw * 1.0, ch * 0.38, 3); ctx.fill();

  // Arms
  const armLen = ch * 0.3, foreLen = ch * 0.2;
  [[-cw * 1.0, -armSwing], [cw * 1.0, armSwing]].forEach(([ax, sw]) => {
    ctx.save();
    ctx.translate(ax, -ch * 0.52);
    ctx.rotate(sw + (state === 'talk' && ax > 0 ? -0.4 : 0));
    ctx.fillStyle = vest;
    ctx.beginPath(); ctx.roundRect(-cw * 0.28, 0, cw * 0.56, armLen, 3); ctx.fill();
    ctx.translate(0, armLen);
    ctx.fillStyle = skin;
    ctx.beginPath(); ctx.roundRect(-cw * 0.22, 0, cw * 0.44, foreLen, 3); ctx.fill();
    ctx.restore();
  });

  // Neck
  ctx.fillStyle = skin;
  ctx.beginPath(); ctx.roundRect(-cw * 0.25, -ch * 0.64, cw * 0.5, ch * 0.07, 2); ctx.fill();

  // Head
  ctx.fillStyle = skin;
  ctx.beginPath(); ctx.ellipse(0, -ch * 0.78, cw * 0.65, cw * 0.8, 0, 0, Math.PI * 2); ctx.fill();

  // Hair
  ctx.fillStyle = hair;
  ctx.beginPath(); ctx.ellipse(0, -ch * 0.86, cw * 0.67, cw * 0.5, 0, 0, Math.PI); ctx.fill();

  // Eyes
  ctx.fillStyle = '#0A0A0A';
  ctx.beginPath();
  ctx.arc(-cw * 0.22, -ch * 0.79, cw * 0.09, 0, Math.PI * 2);
  ctx.arc( cw * 0.22, -ch * 0.79, cw * 0.09, 0, Math.PI * 2);
  ctx.fill();

  // Sommelier bow tie
  if (isSommelier) {
    ctx.fillStyle = '#C8A46A';
    ctx.beginPath();
    ctx.moveTo(-cw * 0.35, -ch * 0.6);
    ctx.lineTo(0,           -ch * 0.54);
    ctx.lineTo( cw * 0.35, -ch * 0.6);
    ctx.lineTo(0,           -ch * 0.66);
    ctx.closePath();
    ctx.fill();
  }

  ctx.restore();
}

function drawHotspotGlow(hs) {
  if (hoveredHs !== hs) return;
  const hx = hs.xFrac * W;
  const pulse = 0.55 + Math.sin(elapsed * 3.2) * 0.2;
  const gg = ctx.createRadialGradient(hx, FLOOR_Y, 0, hx, FLOOR_Y, hs.hoverW() * 0.9);
  gg.addColorStop(0, `rgba(200,164,106,${0.22 * pulse})`);
  gg.addColorStop(1, 'rgba(200,164,106,0)');
  ctx.fillStyle = gg;
  ctx.beginPath();
  ctx.ellipse(hx, FLOOR_Y, hs.hoverW() * 0.9, hs.hoverW() * 0.28, 0, 0, Math.PI * 2);
  ctx.fill();
}

function drawClickIndicator() {
  if (!clickInd) return;
  const op = Math.max(0, 0.8 - clickInd.age * 2.5);
  const sc = 1 + clickInd.age * 2.5;
  ctx.save();
  ctx.strokeStyle = `rgba(200,164,106,${op})`;
  ctx.lineWidth   = 1.5;
  ctx.beginPath();
  ctx.ellipse(clickInd.x, FLOOR_Y + H * 0.005, W * 0.018 * sc, H * 0.006 * sc, 0, 0, Math.PI * 2);
  ctx.stroke();
  ctx.restore();
}

function drawVignette() {
  const vg = ctx.createRadialGradient(W / 2, H * 0.5, H * 0.28, W / 2, H * 0.5, H * 0.85);
  vg.addColorStop(0, 'rgba(0,0,0,0)');
  vg.addColorStop(1, 'rgba(0,0,0,0.72)');
  ctx.fillStyle = vg;
  ctx.fillRect(0, 0, W, H);
}

// ── update + render loop ──────────────────────────────────────────────
function update(dt) {
  elapsed += dt;

  if (player.interactTimer > 0) {
    player.interactTimer -= dt;
    if (player.interactTimer <= 0) { player.state = 'idle'; player.interactTimer = 0; }
  } else if (player.targetX !== null) {
    const dx = player.targetX - player.x;
    if (Math.abs(dx) < 2) {
      player.x = player.targetX;
      player.targetX = null;
      player.state = 'idle';
    } else {
      player.x    += Math.sign(dx) * WALK_SPEED * dt;
      player.facing = dx > 0 ? 1 : -1;
      player.state  = 'walk';
    }
  }
  player.animTime += dt;

  npc.animTime += dt;
  npc.state = Math.floor(elapsed / 4) % 2 === 0 ? 'idle' : 'talk';

  if (clickInd) {
    clickInd.age += dt;
    if (clickInd.age > 0.5) clickInd = null;
  }
}

function render() {
  ctx.clearRect(0, 0, W, H);

  drawBackground();
  drawVault();
  // Left wall niches (brick fill below arches on left)
  drawBrickRect(0, CEIL_Y + (W / 4) * 0.88, W * 0.22, FLOOR_Y - CEIL_Y - (W / 4) * 0.88);
  drawFloor();
  drawNiches();
  drawBar();
  drawGrate();

  hotspots.forEach(hs => drawHotspotGlow(hs));

  // NPC behind bar (draw at bar position, slightly smaller / behind counter)
  ctx.save();
  ctx.globalAlpha = 0.92;
  drawCharacter(W * 0.74, -1, npc.state, npc.animTime, true);
  ctx.restore();

  drawCharacter(player.x, player.facing, player.state, player.animTime, false);
  drawClickIndicator();
  drawVignette();
}

let last = null;
function loop(ts) {
  const dt = last ? Math.min((ts - last) / 1000, 0.05) : 0;
  last = ts;
  update(dt);
  render();
  requestAnimationFrame(loop);
}

// ── loader ────────────────────────────────────────────────────────────
const loaderEl = document.getElementById('loader');
const fillEl   = document.getElementById('fill');
let si = 0;
const fillSteps = [20, 45, 70, 90, 100];
const iv = setInterval(() => {
  if (si < fillSteps.length) fillEl.style.width = fillSteps[si++] + '%';
  else clearInterval(iv);
}, 120);
setTimeout(() => {
  loaderEl.style.opacity = '0';
  setTimeout(() => loaderEl.remove(), 900);
  requestAnimationFrame(loop);
}, 700);
</script>
</body>
