<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>BL Uncorked — Wine Cellar</title>
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.165.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.165.0/examples/jsm/"
  }
}
</script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#1a0a04;overflow:hidden;font-family:'Georgia',serif}
canvas{display:block}
#ui{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
  color:#c8a46a;font-size:12px;letter-spacing:.15em;text-transform:uppercase;
  opacity:.7;pointer-events:none;text-shadow:0 0 12px rgba(200,164,106,.5);
  white-space:nowrap;
}
#logo{
  position:fixed;top:20px;left:24px;color:#c8a46a;
  font-size:15px;letter-spacing:.25em;text-transform:uppercase;
  opacity:.85;pointer-events:none;text-shadow:0 0 16px rgba(200,164,106,.45);
}
#loader{
  position:fixed;inset:0;background:#1a0a04;display:flex;
  flex-direction:column;align-items:center;justify-content:center;
  gap:18px;z-index:100;transition:opacity .9s ease;
}
#loader h1{color:#c8a46a;font-size:26px;letter-spacing:.35em;font-weight:normal}
#loader p{color:rgba(200,164,106,.5);font-size:10px;letter-spacing:.2em;text-transform:uppercase}
.bar{width:200px;height:1px;background:#2a1610;position:relative;overflow:hidden}
.fill{position:absolute;height:100%;background:#c8a46a;width:0%;transition:width .25s ease;box-shadow:0 0 8px #ffbe6a}
#hotlabel{
  display:none;position:fixed;
  background:rgba(26,10,4,.85);color:#c8a46a;
  border:1px solid rgba(200,164,106,.5);
  font-family:'Georgia',serif;font-size:12px;letter-spacing:.12em;text-transform:uppercase;
  padding:6px 14px;border-radius:2px;pointer-events:none;
  text-shadow:0 0 8px rgba(200,164,106,.4);
  transform:translate(-50%,-100%);margin-top:-10px;
  white-space:nowrap;
}
#dialog{
  display:none;position:fixed;bottom:80px;left:50%;transform:translateX(-50%);
  width:min(600px,90vw);
  background:rgba(26,10,4,.92);
  border:1px solid #c8a46a;
  border-radius:3px;
  padding:22px 28px 18px;
  color:#e8d5b0;font-family:'Georgia',serif;
  box-shadow:0 0 32px rgba(200,164,106,.18);
  opacity:0;transition:opacity .3s ease;
  z-index:20;
}
#dialog.visible{opacity:1}
#dlg-speaker{
  color:#c8a46a;font-size:11px;letter-spacing:.25em;text-transform:uppercase;
  margin-bottom:10px;
}
#dlg-text{font-size:15px;line-height:1.65;color:#e8d5b0}
#dlg-close{
  margin-top:16px;float:right;
  background:transparent;color:#c8a46a;
  border:1px solid rgba(200,164,106,.5);
  font-family:'Georgia',serif;font-size:11px;letter-spacing:.12em;text-transform:uppercase;
  padding:5px 14px;cursor:pointer;border-radius:2px;
  transition:background .2s;
}
#dlg-close:hover{background:rgba(200,164,106,.2)}
</style>
</head>
<body>
<div id="loader">
  <h1>BL Uncorked</h1>
  <div class="bar"><div class="fill" id="fill"></div></div>
  <p>Preparing the cellar&hellip;</p>
</div>
<div id="logo">BL Uncorked</div>
<div id="ui">Click to move</div>
<div id="hotlabel"></div>
<div id="dialog">
  <div id="dlg-speaker"></div>
  <div id="dlg-text"></div>
  <button id="dlg-close">Close</button>
</div>

<script>
window.addEventListener('error', function(e){
  var p = document.querySelector('#loader p');
  if(p) p.textContent = 'Error: ' + e.message;
});
window.addEventListener('unhandledrejection', function(e){
  var p = document.querySelector('#loader p');
  if(p) p.textContent = 'Error: ' + e.reason;
});
</script>

<script type="module">
import * as THREE from 'three';
import { EffectComposer }  from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass }      from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
import { RoomEnvironment } from 'three/addons/environments/RoomEnvironment.js';

// ── constants ─────────────────────────────────────────────────────────
const ROOM_W=14, ROOM_L=22, WALL_H=3.8;
const ARCH_H=6.8, ARCH_COUNT=5;
const ATRIUM_R=2.2, ATRIUM_DEPTH=3.5;
const AX=-1.5, AZ=1.5;
const VOID_R=3.0, VOID_CX=-1.5, VOID_CZ=1.5;

// ── renderer ──────────────────────────────────────────────────────────
const renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.setSize(innerWidth,innerHeight);
renderer.shadowMap.enabled=true;
renderer.shadowMap.type=THREE.PCFSoftShadowMap;
renderer.toneMapping=THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure=2.2;
renderer.outputColorSpace=THREE.SRGBColorSpace;
document.body.appendChild(renderer.domElement);

// ── scene + camera ────────────────────────────────────────────────────
const scene=new THREE.Scene();
scene.background=new THREE.Color('#2A1205');

const ISO_DX=11,ISO_DY=11,ISO_DZ=11;
let isoFrustum=16;
const isoAspect=()=>innerWidth/innerHeight;
const camera=new THREE.OrthographicCamera(
  isoFrustum*isoAspect()/-2, isoFrustum*isoAspect()/2,
  isoFrustum/2, isoFrustum/-2, 0.1, 200);
camera.position.set(4+ISO_DX, ISO_DY, 8+ISO_DZ);
camera.lookAt(4, 0, 8);

// ── post-processing ───────────────────────────────────────────────────
const composer=new EffectComposer(renderer);
composer.addPass(new RenderPass(scene,camera));
composer.addPass(new UnrealBloomPass(new THREE.Vector2(innerWidth,innerHeight),0.45,0.55,0.65));

// ── env map ───────────────────────────────────────────────────────────
const pmrem=new THREE.PMREMGenerator(renderer);
const envTex=pmrem.fromScene(new RoomEnvironment()).texture;
scene.environment=envTex;
pmrem.dispose();

// ─────────────────────────────────────────────────────────────────────
// LIGHTING
// ─────────────────────────────────────────────────────────────────────
scene.add(new THREE.AmbientLight('#7A3C18',1.8));
scene.add(new THREE.HemisphereLight('#FF9A3C','#3D1C08',0.8));

[[-5,5.5,-8],[-2,5.5,-4],[1,5.5,0],[3,5.5,4],[-3,5.5,8],[2,5.5,8]].forEach(([x,y,z])=>{
  const pl=new THREE.PointLight('#FF9A3C',2.5,14);
  pl.position.set(x,y,z); scene.add(pl);
});
[-6,6].forEach(x=>{
  [[2.5,0],[2.5,-7],[2.5,7]].forEach(([py,pz])=>{
    const wl=new THREE.PointLight('#C87040',pz===0?1.5:1.2,pz===0?12:10);
    wl.position.set(x*.6,py,pz); scene.add(wl);
  });
});
const barSpot=new THREE.SpotLight('#FFF5C8',4,12,Math.PI/4.5,0.4,1.2);
barSpot.position.set(2,6,-8); barSpot.target.position.set(2,2,-10.5);
scene.add(barSpot); scene.add(barSpot.target);

const atriumGlow=new THREE.PointLight('#FF6818',2.0,6);
atriumGlow.position.set(AX,-0.5,AZ); scene.add(atriumGlow);

// ─────────────────────────────────────────────────────────────────────
// FLOOR — narrow-plank shader
// ─────────────────────────────────────────────────────────────────────
const woodMat=new THREE.ShaderMaterial({
  uniforms:{
    uBase:{value:new THREE.Color('#C8A46A')},
    uDark:{value:new THREE.Color('#8B6535')},
    uPlank:{value:0.13},
    uFreq:{value:55.0},
    uStr:{value:0.14},
  },
  vertexShader:`varying vec3 vP;void main(){vP=position;gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.);}`,
  fragmentShader:`
    uniform vec3 uBase,uDark;uniform float uPlank,uFreq,uStr;
    varying vec3 vP;
    float rand(vec2 c){return fract(sin(dot(c,vec2(127.1,311.7)))*43758.5453);}
    void main(){
      float pi=floor(vP.x/uPlank);
      float po=rand(vec2(pi,0.));float pd=rand(vec2(pi,1.))*0.12;
      float g=sin((vP.z+po*3.)*uFreq)*uStr+sin((vP.z+po*1.5)*uFreq*.4)*uStr*.5;
      g=g*.5+.5;
      float s=smoothstep(0.,.018,fract(vP.x/uPlank))*smoothstep(1.,.982,fract(vP.x/uPlank));
      vec3 col=mix(uDark,uBase,g)-pd; col*=s*.82+.18;
      gl_FragColor=vec4(col,1.);
    }`,
});
const floorMesh=new THREE.Mesh(new THREE.PlaneGeometry(ROOM_W,ROOM_L,120,120),woodMat);
floorMesh.rotateX(-Math.PI/2); floorMesh.position.y=0.01; scene.add(floorMesh);
const baseMesh=new THREE.Mesh(new THREE.PlaneGeometry(ROOM_W+2,ROOM_L+2),
  new THREE.MeshStandardMaterial({color:'#2A1208'}));
baseMesh.rotateX(-Math.PI/2); scene.add(baseMesh);

// ─────────────────────────────────────────────────────────────────────
// VAULT — barrel ceiling + arch ribs + string lights
// ─────────────────────────────────────────────────────────────────────
(function(){
  const r=ROOM_W/2;
  const brickMat=new THREE.MeshStandardMaterial({color:'#8B4A2F',roughness:0.9,metalness:0,side:THREE.BackSide});
  const ribMat=new THREE.MeshStandardMaterial({color:'#7A3F28',roughness:0.88});
  const shape=new THREE.Shape();
  for(let i=0;i<=64;i++){
    const t=(i/64)*Math.PI;
    i===0?shape.moveTo(-r*Math.cos(t),r*Math.sin(t)*(ARCH_H/r)):shape.lineTo(-r*Math.cos(t),r*Math.sin(t)*(ARCH_H/r));
  }
  shape.lineTo(r,0); shape.lineTo(-r,0);
  const vGeo=new THREE.ExtrudeGeometry(shape,{depth:ROOM_L,bevelEnabled:false});
  vGeo.rotateX(Math.PI/2); vGeo.translate(0,0,ROOM_L/2);
  const pos=vGeo.attributes.position;
  const cols=new Float32Array(pos.count*3);
  const pal=['#8B4A2F','#A05530','#7A3C25','#B06040','#954030'].map(c=>new THREE.Color(c));
  for(let i=0;i<pos.count;i++){
    const c=pal[Math.floor(Math.random()*pal.length)];
    cols[i*3]=c.r;cols[i*3+1]=c.g;cols[i*3+2]=c.b;
  }
  vGeo.setAttribute('color',new THREE.BufferAttribute(cols,3));
  brickMat.vertexColors=true;
  scene.add(new THREE.Mesh(vGeo,brickMat));
  const sp=ROOM_L/(ARCH_COUNT-1);
  for(let i=0;i<ARCH_COUNT;i++){
    const z=-ROOM_L/2+i*sp;
    const pts=[];
    for(let j=0;j<=32;j++){const t=(j/32)*Math.PI;pts.push(new THREE.Vector3(-r*Math.cos(t),r*Math.sin(t)*(ARCH_H/r),z));}
    scene.add(new THREE.Mesh(new THREE.TubeGeometry(new THREE.CatmullRomCurve3(pts),32,0.18,8,false),ribMat));
    for(let j=0;j<=20;j+=2){
      const t=(j/20)*Math.PI;
      const bx=-r*Math.cos(t), by=r*Math.sin(t)*(ARCH_H/r)-0.12;
      const bulb=new THREE.Mesh(new THREE.SphereGeometry(.045,6,6),
        new THREE.MeshStandardMaterial({emissive:'#FFE080',emissiveIntensity:4,color:'#FFF5C8'}));
      bulb.position.set(bx,by,z); scene.add(bulb);
      if(j%4===0){const pl=new THREE.PointLight('#FF9A3C',1.0,5.5);pl.position.set(bx,by-.1,z);scene.add(pl);}
    }
  }
})();

// ─────────────────────────────────────────────────────────────────────
// WALLS — brick + arched niches with candles
// ─────────────────────────────────────────────────────────────────────
const mkBrick=()=>new THREE.MeshStandardMaterial({color:'#7A3C25',roughness:0.93,metalness:0});
const nicheMat=new THREE.MeshStandardMaterial({color:'#5A2E18',roughness:0.97,side:THREE.BackSide});

const bw=new THREE.Mesh(new THREE.PlaneGeometry(ROOM_W,WALL_H),mkBrick());
bw.position.set(0,WALL_H/2,-ROOM_L/2); scene.add(bw);
const fw=new THREE.Mesh(new THREE.PlaneGeometry(ROOM_W,WALL_H),mkBrick());
fw.position.set(0,WALL_H/2,ROOM_L/2); fw.rotation.y=Math.PI; scene.add(fw);

function buildSideWall(xPos,dir){
  const NC=3,NW=1.4,NH=2.2,ND=0.6;
  const sp=ROOM_L/(NC+1), mat=mkBrick();
  for(let i=0;i<NC;i++){
    const z=-ROOM_L/2+sp*(i+1), pw=sp-NW;
    if(pw>.2){
      [-1,1].forEach(s=>{
        const p=new THREE.Mesh(new THREE.PlaneGeometry(pw*.88,WALL_H),mat);
        p.position.set(xPos,WALL_H/2,z+s*(NW/2+pw*.44));
        p.rotation.y=dir>0?Math.PI/2:-Math.PI/2; scene.add(p);
      });
    }
    const nb=new THREE.Mesh(new THREE.PlaneGeometry(NW,NH),nicheMat);
    nb.position.set(xPos-dir*ND,NH/2+.1,z);
    nb.rotation.y=dir>0?Math.PI/2:-Math.PI/2; scene.add(nb);
    [-1,1].forEach(s=>{
      const ns=new THREE.Mesh(new THREE.PlaneGeometry(ND,NH),nicheMat);
      ns.position.set(xPos-dir*ND/2,NH/2+.1,z+s*NW/2);
      ns.rotation.y=s*dir>0?0:Math.PI; scene.add(ns);
    });
    const ag=new THREE.CylinderGeometry(NW/2,NW/2,ND,16,1,true,0,Math.PI);
    ag.rotateZ(Math.PI/2); ag.rotateY(dir>0?Math.PI/2:-Math.PI/2);
    const am=new THREE.Mesh(ag,nicheMat);
    am.position.set(xPos-dir*ND/2,NH+.1,z); scene.add(am);
    {const cnd=new THREE.Mesh(new THREE.CylinderGeometry(.04,.04,.25,8),new THREE.MeshStandardMaterial({color:'#E8D5B0'}));
    cnd.position.set(xPos-dir*(ND-.05),NH*.25,z);scene.add(cnd);}
    const fl=new THREE.PointLight('#FF8020',1.2,3.0);
    fl.position.set(xPos-dir*(ND-.05),NH*.25+.2,z);
    fl.userData={base:1.2,speed:3+Math.random()*2,phase:Math.random()*Math.PI*2};
    scene.add(fl);
  }
  const ts=new THREE.Mesh(new THREE.PlaneGeometry(ROOM_L,WALL_H-NH-.3),mat);
  ts.position.set(xPos,WALL_H-(WALL_H-NH-.3)/2,0);
  ts.rotation.y=dir>0?Math.PI/2:-Math.PI/2; scene.add(ts);
}
buildSideWall(-ROOM_W/2,1);
buildSideWall( ROOM_W/2,-1);

// ─────────────────────────────────────────────────────────────────────
// ATRIUM
// ─────────────────────────────────────────────────────────────────────
const atriumWall=new THREE.Mesh(
  new THREE.CylinderGeometry(ATRIUM_R,ATRIUM_R,ATRIUM_DEPTH,48,1,true),
  new THREE.MeshStandardMaterial({color:'#5A2E18',roughness:.97,side:THREE.BackSide}));
atriumWall.position.set(AX,-(ATRIUM_DEPTH/2)-.05,AZ); scene.add(atriumWall);
const lf=new THREE.Mesh(new THREE.CircleGeometry(ATRIUM_R,48),
  new THREE.MeshStandardMaterial({color:'#4A2810',roughness:.95}));
lf.rotation.x=-Math.PI/2; lf.position.set(AX,-ATRIUM_DEPTH-.05,AZ); scene.add(lf);
[[-.8,-.5],[.5,.4],[-.3,.9]].forEach(([tx,tz])=>{
  const ty=-ATRIUM_DEPTH+.03;
  const tbl=new THREE.Mesh(new THREE.CylinderGeometry(.45,.45,.05,16),
    new THREE.MeshStandardMaterial({color:'#E8D5B0',roughness:.6}));
  tbl.position.set(AX+tx,ty+.72,AZ+tz); scene.add(tbl);
  const leg=new THREE.Mesh(new THREE.CylinderGeometry(.04,.04,.7,8),
    new THREE.MeshStandardMaterial({color:'#3D2010'}));
  leg.position.set(AX+tx,ty+.35,AZ+tz); scene.add(leg);
  const cf=new THREE.PointLight('#FF7010',.8,1.5);
  cf.position.set(AX+tx,ty+.85,AZ+tz);
  cf.userData={base:.8,speed:4+Math.random()*2,phase:Math.random()*Math.PI*2};
  scene.add(cf);
});
const caveL=new THREE.PointLight('#FF9A3C',2.0,ATRIUM_DEPTH*1.4);
caveL.position.set(AX,-ATRIUM_DEPTH+1,AZ); scene.add(caveL);

// ─────────────────────────────────────────────────────────────────────
// GLASS RAILING
// ─────────────────────────────────────────────────────────────────────
const brassMat=new THREE.MeshStandardMaterial({color:'#C8A060',roughness:0.15,metalness:0.95,envMapIntensity:1.5});
const glassMat=new THREE.MeshStandardMaterial({
  color:'#D4B87A',transparent:true,opacity:0.28,roughness:0.04,
  metalness:0.0,side:THREE.DoubleSide,depthWrite:false});
const POST_COUNT=32,PANEL_COUNT=24,RAIL_H=0.95;
[0,RAIL_H].forEach(yo=>{
  const pts=[];
  for(let i=0;i<=80;i++){const a=(i/80)*Math.PI*2;pts.push(new THREE.Vector3(AX+Math.cos(a)*ATRIUM_R,yo,AZ+Math.sin(a)*ATRIUM_R));}
  scene.add(new THREE.Mesh(new THREE.TubeGeometry(new THREE.CatmullRomCurve3(pts,true),80,.028,8,true),brassMat));
});
for(let i=0;i<PANEL_COUNT;i++){
  const a0=(i/PANEL_COUNT)*Math.PI*2,a1=((i+1)/PANEL_COUNT)*Math.PI*2,aMid=(a0+a1)/2;
  const arcLen=ATRIUM_R*(a1-a0)*0.9;
  const pane=new THREE.Mesh(new THREE.PlaneGeometry(arcLen,RAIL_H*.88),glassMat);
  pane.position.set(AX+Math.cos(aMid)*ATRIUM_R,RAIL_H/2,AZ+Math.sin(aMid)*ATRIUM_R);
  pane.rotation.y=Math.PI/2-aMid; scene.add(pane);
}
for(let i=0;i<POST_COUNT;i++){
  const a=(i/POST_COUNT)*Math.PI*2;
  const px=AX+Math.cos(a)*ATRIUM_R,pz=AZ+Math.sin(a)*ATRIUM_R;
  const post=new THREE.Mesh(new THREE.CylinderGeometry(.022,.022,RAIL_H,8),brassMat);
  post.position.set(px,RAIL_H/2,pz); scene.add(post);
  const cap=new THREE.Mesh(new THREE.SphereGeometry(.032,8,8),brassMat);
  cap.position.set(px,RAIL_H+.032,pz); scene.add(cap);
}

// ─────────────────────────────────────────────────────────────────────
// BOTTLE LABELS
// ─────────────────────────────────────────────────────────────────────
const WINE_NAMES=[
  ['BL','UNCORKED','Reserve','2019'],['CAVE','NOIR','Grand Cru','2017'],
  ['VOLTA','ROUGE','Barrel Select','2021'],['ARCO','BIANCO','Aged 24 mo.','2020'],
  ['BRAINLABS','CELLAR','Limited','2018'],
];
const PALETTES=[
  {bg:'#F5ECD7',text:'#2A1608',accent:'#8B1A1A',line:'#C8A46A'},
  {bg:'#1A2A1A',text:'#E8D5A0',accent:'#C8A46A',line:'#4A6A4A'},
  {bg:'#EDE0C8',text:'#1C0F08',accent:'#4A2A0A',line:'#8B6535'},
  {bg:'#F0EAE0',text:'#2A1A08',accent:'#2A3A5A',line:'#6A5A4A'},
  {bg:'#2A1A14',text:'#E8D5B0',accent:'#C87050',line:'#6A3A28'},
];
function mkLabel(nm,pal){
  const W=128,H=64,cv=document.createElement('canvas');
  cv.width=W;cv.height=H;const c=cv.getContext('2d');
  c.fillStyle=pal.bg;c.fillRect(0,0,W,H);
  c.strokeStyle=pal.line;c.lineWidth=1.5;c.strokeRect(4,4,W-8,H-8);
  c.lineWidth=.5;c.strokeRect(6,6,W-12,H-12);
  c.fillStyle=pal.accent;c.fillRect(12,10,W-24,2);
  c.fillStyle=pal.text;c.font='bold 11px Georgia,serif';c.textAlign='center';
  c.fillText(nm[0],W/2,26);c.font='8px Georgia,serif';c.fillText(nm[1],W/2,36);
  c.fillStyle=pal.accent;c.font='italic 7px Georgia,serif';c.fillText(nm[2],W/2,46);
  c.fillStyle=pal.text;c.font='6px Georgia,serif';c.fillText(nm[3],W/2,56);
  c.fillStyle=pal.accent;c.fillRect(12,H-12,W-24,1);
  const t=new THREE.CanvasTexture(cv);t.needsUpdate=true;return t;
}

// ─────────────────────────────────────────────────────────────────────
// BAR
// ─────────────────────────────────────────────────────────────────────
const BZ=-10.8;
const barCtr=new THREE.Mesh(new THREE.BoxGeometry(6,1.05,.65),new THREE.MeshStandardMaterial({color:'#3D2010',roughness:.4,metalness:.1}));
barCtr.position.set(2,.525,BZ+.35);scene.add(barCtr);
const barTop=new THREE.Mesh(new THREE.BoxGeometry(6.1,.06,.75),new THREE.MeshStandardMaterial({color:'#C8A46A',roughness:.25,metalness:.05}));
barTop.position.set(2,1.08,BZ+.35);scene.add(barTop);
const SHELF_W=5.5,glassCols=['#1A3A1A','#4A2A0A','#8B1A1A','#2A3A4A','#3A2A1A'];
for(let si=0;si<4;si++){
  const sy=1.3+si*.55;
  const shf=new THREE.Mesh(new THREE.BoxGeometry(SHELF_W,.04,.3),new THREE.MeshStandardMaterial({color:'#2A1008',roughness:.7}));
  shf.position.set(2,sy,BZ+.04);scene.add(shf);
  const bCount=Math.floor(SHELF_W/.12);
  for(let bi=0;bi<bCount;bi++){
    const bx=2-SHELF_W/2+bi*.12+.06;
    const col=glassCols[(si*7+bi)%glassCols.length];
    const gm=new THREE.MeshStandardMaterial({color:col,roughness:.15,metalness:.1,transparent:true,opacity:.88});
    const bot=new THREE.Mesh(new THREE.CylinderGeometry(.033,.038,.28,10),gm);
    bot.position.set(bx,sy+.15,BZ+.06);scene.add(bot);
    const nk=new THREE.Mesh(new THREE.CylinderGeometry(.016,.033,.1,8),gm);
    nk.position.set(bx,sy+.33,BZ+.06);scene.add(nk);
    if(bi%2===0){
      const ni=(si+Math.floor(bi/2))%WINE_NAMES.length;
      const lm=new THREE.MeshStandardMaterial({
        map:mkLabel(WINE_NAMES[ni],PALETTES[ni%PALETTES.length]),roughness:.6,
        polygonOffset:true,polygonOffsetFactor:-1});
      const lbl=new THREE.Mesh(new THREE.PlaneGeometry(.062,.038),lm);
      lbl.position.set(bx,sy+.14,BZ+.1);scene.add(lbl);
    }
    const fm=new THREE.MeshStandardMaterial({

// ─────────────────────────────────────────────────────────────────────
// ANIMATION SYSTEM
// ─────────────────────────────────────────────────────────────────────
function animateCharacter(parts,state,t){
  const R=(g,x=0,y=0,z=0)=>g.rotation.set(x,y,z);
  const S=Math.sin;
  const {hips,torsoPivot,lHipPivot,rHipPivot,lKneePivot,rKneePivot,
    lAnklePivot,rAnklePivot,lShoulderPivot,rShoulderPivot,
    lElbowPivot,rElbowPivot,lWristPivot,rWristPivot,neckPivot,headPivot}=parts;

  R(lHipPivot);R(rHipPivot);R(lKneePivot);R(rKneePivot);
  R(lAnklePivot);R(rAnklePivot);R(torsoPivot);R(hips);
  R(lShoulderPivot);R(rShoulderPivot);R(lElbowPivot);R(rElbowPivot);
  R(lWristPivot);R(rWristPivot);R(neckPivot);R(headPivot);
  hips.position.y=0.62;

  if(state==='idle'){
    hips.position.y=0.62+S(t*1.4)*0.012;
    R(headPivot,S(t*0.8)*0.04,S(t*1.1)*0.05,0);
    R(lShoulderPivot,0.12,0,0); R(rShoulderPivot,0.12,0,0);
  } else if(state==='walk'){
    hips.position.y=0.62+S(t*9)*0.012;
    R(lHipPivot,  S(t*4.5)*0.32,0,0);
    R(rHipPivot, -S(t*4.5)*0.32,0,0);
    R(lKneePivot,Math.max(0,-S(t*4.5))*0.45,0,0);
    R(rKneePivot,Math.max(0, S(t*4.5))*0.45,0,0);
    R(lShoulderPivot,-S(t*4.5)*0.2,0,0);
    R(rShoulderPivot, S(t*4.5)*0.2,0,0);
    R(torsoPivot,0,S(t*4.5)*0.06,0);
  } else if(state==='talk'){
    R(headPivot,S(t*2.5)*0.09,0,0);
    R(rShoulderPivot,-0.3+S(t*3)*0.15,0,0.1);
    R(rElbowPivot,-S(t*3)*0.25-0.2,0,0);
    R(lShoulderPivot,0.08,0,0); R(lElbowPivot,0.12,0,0);
  } else if(state==='interact'){
    R(torsoPivot,0.18,0,0);
    R(rShoulderPivot,-0.55,0,0); R(rElbowPivot,-0.35,0,0);
    R(lShoulderPivot,0.1,0,0);
  } else if(state==='pickup'){
    R(torsoPivot,0.65,0,0);
    R(lShoulderPivot,-0.5,0,0); R(rShoulderPivot,-0.5,0,0);
    R(lElbowPivot,-0.3,0,0); R(rElbowPivot,-0.3,0,0);
    R(lKneePivot,0.3,0,0); R(rKneePivot,0.3,0,0);
  } else if(state==='use'){
    R(torsoPivot,0.1,0,0);
    R(rShoulderPivot,-0.65,0,0); R(rElbowPivot,-0.4,0,0);
  } else if(state==='examine'){
    R(headPivot,-0.2,0,0.08);
    R(rShoulderPivot,-0.38,0,0); R(rElbowPivot,-0.6,0,0);
    R(rWristPivot,0.2,0,0);
  } else if(state==='give'){
    R(lShoulderPivot,-0.5,0,0); R(rShoulderPivot,-0.5,0,0);
    R(lElbowPivot,-0.25,0,0); R(rElbowPivot,-0.25,0,0);
  } else if(state==='shrug'){
    const sw=S(t*2)*0.4+0.18;
    R(lShoulderPivot,0,0,sw); R(rShoulderPivot,0,0,-sw);
    R(lElbowPivot,0,0,0.3); R(rElbowPivot,0,0,-0.3);
    R(headPivot,0,0,S(t*2)*0.12);
  }
}

// ─────────────────────────────────────────────────────────────────────
// PATH SYSTEM — atrium void avoidance
// ─────────────────────────────────────────────────────────────────────
function segCircle2D(p1x,p1z,p2x,p2z,cx,cz,r){
  const dx=p2x-p1x,dz=p2z-p1z,fx=p1x-cx,fz=p1z-cz;
  const a=dx*dx+dz*dz,b=2*(fx*dx+fz*dz),c=fx*fx+fz*fz-r*r;
  const disc=b*b-4*a*c; if(disc<0) return false;
  const sq=Math.sqrt(disc),t1=(-b-sq)/(2*a),t2=(-b+sq)/(2*a);
  return (t1>=0&&t1<=1)||(t2>=0&&t2<=1);
}
function computeWaypoints(from,to){
  if(!segCircle2D(from.x,from.z,to.x,to.z,VOID_CX,VOID_CZ,VOID_R)) return [to.clone()];
  const angle=Math.atan2(VOID_CZ-from.z,VOID_CX-from.x);
  const p1=new THREE.Vector3(VOID_CX+Math.cos(angle+Math.PI/2)*VOID_R,0,VOID_CZ+Math.sin(angle+Math.PI/2)*VOID_R);
  const p2=new THREE.Vector3(VOID_CX+Math.cos(angle-Math.PI/2)*VOID_R,0,VOID_CZ+Math.sin(angle-Math.PI/2)*VOID_R);
  const d1=from.distanceTo(p1)+p1.distanceTo(to),d2=from.distanceTo(p2)+p2.distanceTo(to);
  return [d1<d2?p1:p2,to.clone()];
}

// ─────────────────────────────────────────────────────────────────────
// PLAYER UPDATE
// ─────────────────────────────────────────────────────────────────────
function updatePlayer(dt){
  if(player.interactTimer>0){
    player.interactTimer-=dt;
    if(player.interactTimer<=0){player.state='idle';player.interactTimer=0;}
    player.mesh.group.position.set(player.pos.x,0,player.pos.z);
    player.mesh.group.rotation.y=player.facing;
    return;
  }
  if(player.waypoints.length===0){
    if(player.state==='walk') player.state='idle';
    player.mesh.group.position.set(player.pos.x,0,player.pos.z);
    player.mesh.group.rotation.y=player.facing;
    return;
  }
  const next=player.waypoints[0];
  const dx=next.x-player.pos.x, dz=next.z-player.pos.z;
  const dist=Math.sqrt(dx*dx+dz*dz);
  if(dist<0.12){player.waypoints.shift();return;}
  const step=Math.min(dist,player.speed*dt);
  player.pos.x+=(dx/dist)*step;
  player.pos.z+=(dz/dist)*step;
  player.facing=Math.atan2(dx,dz);
  player.state='walk';
  player.mesh.group.position.set(player.pos.x,0,player.pos.z);
  player.mesh.group.rotation.y=player.facing;
  // NPC reacts to proximity
  const ndx=player.pos.x-npc.pos.x, ndz=player.pos.z-npc.pos.z;
  if(Math.sqrt(ndx*ndx+ndz*ndz)<2.5) npc.state='talk';
}

// GAME CAMERA
// ─────────────────────────────────────────────────────────────────────
function updateGameCamera(dt){
  const pp=player.pos;
  const tx=pp.x+ISO_DX, tz=pp.z+ISO_DZ;
  camera.position.x+=(tx-camera.position.x)*Math.min(1,dt*3);
  camera.position.z+=(tz-camera.position.z)*Math.min(1,dt*3);
  camera.position.y=ISO_DY;
  camera.lookAt(camera.position.x-ISO_DX, 0, camera.position.z-ISO_DZ);
}

function triggerHotspot(hs){
  const dist=player.pos.distanceTo(hs.approachPos);
  if(dist>2.0){
    player.waypoints=computeWaypoints(player.pos,hs.approachPos);
    player.state='walk';
    const chk=setInterval(()=>{
      if(player.pos.distanceTo(hs.approachPos)<1.8){clearInterval(chk);triggerInteraction(hs);}
    },100);
  } else triggerInteraction(hs);
}
function triggerInteraction(hs){
  player.waypoints=[];
  player.state=hs.interactState;
  player.interactTimer=2.0;
  const dx=hs.mesh.position.x-player.pos.x, dz=hs.mesh.position.z-player.pos.z;

const floorRayMesh=new THREE.Mesh(
  new THREE.PlaneGeometry(ROOM_W,ROOM_L),
  new THREE.MeshBasicMaterial({visible:false,side:THREE.DoubleSide}));
floorRayMesh.rotation.x=-Math.PI/2; scene.add(floorRayMesh);

const raycaster=new THREE.Raycaster();
const mouse=new THREE.Vector2();
const hotlabelEl=document.getElementById('hotlabel');

renderer.domElement.addEventListener('mousemove',e=>{
  const rect=renderer.domElement.getBoundingClientRect();
  mouse.x=((e.clientX-rect.left)/rect.width)*2-1;
  mouse.y=-((e.clientY-rect.top)/rect.height)*2+1;
  raycaster.setFromCamera(mouse,camera);
  const hits=raycaster.intersectObjects(hotspots.map(h=>h.mesh));
  if(hits.length>0){
    const hs=hits[0].object.userData.hs;
    hotlabelEl.textContent=hs.icon+' '+hs.label;
    hotlabelEl.style.display='block';
    hotlabelEl.style.left=e.clientX+'px';
    hotlabelEl.style.top=(e.clientY-4)+'px';
    renderer.domElement.style.cursor='pointer';
  } else {
    hotlabelEl.style.display='none';
    renderer.domElement.style.cursor='';
  }
});

renderer.domElement.addEventListener('click',e=>{
  if(activeDialog) return;
  const rect=renderer.domElement.getBoundingClientRect();
  mouse.x=((e.clientX-rect.left)/rect.width)*2-1;
  mouse.y=-((e.clientY-rect.top)/rect.height)*2+1;
  raycaster.setFromCamera(mouse,camera);

  const hsHits=raycaster.intersectObjects(hotspots.map(h=>h.mesh));
  if(hsHits.length>0){triggerHotspot(hsHits[0].object.userData.hs);return;}

  const floorHits=raycaster.intersectObject(floorRayMesh);
  if(floorHits.length>0){
    const pt=floorHits[0].point;
    const vdx=pt.x-VOID_CX, vdz=pt.z-VOID_CZ;
    if(Math.sqrt(vdx*vdx+vdz*vdz)<3.2) return;
    if(Math.abs(pt.x)>6.5||pt.z<-10.3||pt.z>10.3) return;
    player.waypoints=computeWaypoints(player.pos,pt);
    player.state='walk'; player.interactTimer=0;
    showClickIndicator(pt);
  }
});


// ─────────────────────────────────────────────────────────────────────
// RESIZE
// ─────────────────────────────────────────────────────────────────────
window.addEventListener('resize',()=>{
  const a=isoAspect();
  camera.left=isoFrustum*a/-2; camera.right=isoFrustum*a/2;
  camera.top=isoFrustum/2; camera.bottom=isoFrustum/-2;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
  composer.setSize(innerWidth,innerHeight);
});

// ─────────────────────────────────────────────────────────────────────
// RENDER LOOP
// ─────────────────────────────────────────────────────────────────────
const clock=new THREE.Clock(); let elapsed=0;

function animate(){
  requestAnimationFrame(animate);
  const dt=clock.getDelta(); elapsed+=dt;

  // NPC auto-state (idle/talk every 4 s), unless player nearby
  const ndx=player.pos.x-npc.pos.x, ndz=player.pos.z-npc.pos.z;
  if(Math.sqrt(ndx*ndx+ndz*ndz)>=2.5)
    npc.state=Math.floor(elapsed/4)%2===0?'idle':'talk';
  npc.animTime+=dt;
  animateCharacter(npc.mesh.parts,npc.state,npc.animTime);

  // Player
  updatePlayer(dt);
  player.animTime+=dt;
  animateCharacter(player.mesh.parts,player.state,player.animTime);

  // Camera
  updateGameCamera(dt);

  // Candle flicker
  scene.traverse(o=>{
    if(o.isPointLight&&o.userData.base!==undefined)
      o.intensity=o.userData.base+Math.sin(elapsed*o.userData.speed+o.userData.phase)*.18;
  });

  composer.render();
}

// ─── loader ───────────────────────────────────────────────────────────
const loaderEl=document.getElementById('loader');
const fillEl=document.getElementById('fill');
let si=0; const steps=[10,25,40,55,70,85,95,100];
const iv=setInterval(()=>{if(si<steps.length) fillEl.style.width=steps[si++]+'%'; else clearInterval(iv);},80);
setTimeout(()=>{loaderEl.style.opacity='0';setTimeout(()=>loaderEl.remove(),900);},900);

animate();
</script>
