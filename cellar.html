<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>BL Uncorked — Wine Cellar</title>
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.165.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.165.0/examples/jsm/"
  }
}
</script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#1a0a04;overflow:hidden;font-family:'Georgia',serif}
canvas{display:block}
#ui{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
  color:#c8a46a;font-size:12px;letter-spacing:.15em;text-transform:uppercase;
  opacity:.7;pointer-events:none;text-shadow:0 0 12px rgba(200,164,106,.5);
  white-space:nowrap;
}
#modeBtn{
  position:fixed;top:20px;right:20px;
  background:rgba(200,164,106,.15);color:#c8a46a;
  border:1px solid rgba(200,164,106,.4);font-family:'Georgia',serif;
  font-size:11px;letter-spacing:.12em;text-transform:uppercase;
  padding:8px 18px;cursor:pointer;backdrop-filter:blur(4px);
  border-radius:2px;z-index:10;transition:background .2s;
}
#modeBtn:hover{background:rgba(200,164,106,.3)}
#logo{
  position:fixed;top:20px;left:24px;color:#c8a46a;
  font-size:15px;letter-spacing:.25em;text-transform:uppercase;
  opacity:.85;pointer-events:none;text-shadow:0 0 16px rgba(200,164,106,.45);
}
#loader{
  position:fixed;inset:0;background:#1a0a04;display:flex;
  flex-direction:column;align-items:center;justify-content:center;
  gap:18px;z-index:100;transition:opacity .9s ease;
}
#loader h1{color:#c8a46a;font-size:26px;letter-spacing:.35em;font-weight:normal}
#loader p{color:rgba(200,164,106,.5);font-size:10px;letter-spacing:.2em;text-transform:uppercase}
.bar{width:200px;height:1px;background:#2a1610;position:relative;overflow:hidden}
.fill{position:absolute;height:100%;background:#c8a46a;width:0%;transition:width .25s ease;box-shadow:0 0 8px #ffbe6a}
</style>
</head>
<body>
<div id="loader">
  <h1>BL Uncorked</h1>
  <div class="bar"><div class="fill" id="fill"></div></div>
  <p>Preparing the cellar…</p>
</div>
<div id="logo">BL Uncorked</div>
<div id="ui">Drag to explore · Scroll to zoom</div>
<button id="modeBtn">Walk Mode</button>

<script type="module">
import * as THREE from 'three';
import { OrbitControls }   from 'three/addons/controls/OrbitControls.js';
import { EffectComposer }  from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass }      from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

// ─── constants ────────────────────────────────────────────────────────
const ROOM_W=14, ROOM_L=22, WALL_H=3.8;
const ARCH_H=6.8, ARCH_COUNT=5;
const ATRIUM_R=2.2, ATRIUM_DEPTH=3.5;
const AX=-1.5, AZ=1.5; // atrium world offset

// ─── renderer ─────────────────────────────────────────────────────────
const renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.setSize(innerWidth,innerHeight);
renderer.shadowMap.enabled=true;
renderer.shadowMap.type=THREE.PCFSoftShadowMap;
renderer.toneMapping=THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure=2.2;          // ← was 1.1, much brighter now
renderer.outputColorSpace=THREE.SRGBColorSpace;
document.body.appendChild(renderer.domElement);

// ─── scene + camera ───────────────────────────────────────────────────
const scene=new THREE.Scene();
scene.background=new THREE.Color('#2A1205');
scene.fog=new THREE.FogExp2('#2A1205',0.022);   // ← lighter, less fog

const camera=new THREE.PerspectiveCamera(72,innerWidth/innerHeight,0.1,80);
camera.position.set(5,2.2,9);
camera.lookAt(0,1.8,0);

// ─── orbit ────────────────────────────────────────────────────────────
const orbit=new OrbitControls(camera,renderer.domElement);
orbit.target.set(0,1.8,0);
orbit.enableDamping=true; orbit.dampingFactor=0.06;
orbit.minDistance=1.5; orbit.maxDistance=18;
orbit.maxPolarAngle=Math.PI*.72; orbit.minPolarAngle=Math.PI*.05;

// ─── post-processing ──────────────────────────────────────────────────
const composer=new EffectComposer(renderer);
composer.addPass(new RenderPass(scene,camera));
composer.addPass(new UnrealBloomPass(
  new THREE.Vector2(innerWidth,innerHeight),
  0.45,   // strength (down from 0.55 to not blow out labels)
  0.55,
  0.65,   // threshold (lower = more things glow)
));

// ─── env map for glass reflections ────────────────────────────────────
// simple PMREMGenerator with a warm scene background colour
const pmrem=new THREE.PMREMGenerator(renderer);
pmrem.compileEquirectangularShader();
const envTex=pmrem.fromScene(new THREE.RoomEnvironment()).texture;
scene.environment=envTex;

// ─────────────────────────────────────────────────────────────────────
// LIGHTING  — significantly boosted
// ─────────────────────────────────────────────────────────────────────
// warm ambient fill — was 0.35, now 1.8
scene.add(new THREE.AmbientLight('#7A3C18',1.8));

// hemisphere: warm sky, cooler ground
const hemi=new THREE.HemisphereLight('#FF9A3C','#3D1C08',0.8);
scene.add(hemi);

// distributed vault lights — illuminate brick ceiling and walls
const vaultLights=[
  [-5,5.5,-8],[-2,5.5,-4],[1,5.5,0],[3,5.5,4],[-3,5.5,8],[2,5.5,8],
];
vaultLights.forEach(([x,y,z])=>{
  const pl=new THREE.PointLight('#FF9A3C',2.5,14);
  pl.position.set(x,y,z);
  scene.add(pl);
});

// wall wash — hit side walls from inside
[-6,6].forEach(x=>{
  const wl=new THREE.PointLight('#C87040',1.5,12);
  wl.position.set(x*.6,2.5,0);
  scene.add(wl);
  const wl2=new THREE.PointLight('#C87040',1.2,10);
  wl2.position.set(x*.6,2.5,-7);
  scene.add(wl2);
  const wl3=new THREE.PointLight('#C87040',1.2,10);
  wl3.position.set(x*.6,2.5,7);
  scene.add(wl3);
});

// bar spotlight
const barSpot=new THREE.SpotLight('#FFF5C8',4,12,Math.PI/4.5,0.4,1.2);
barSpot.position.set(2,6,-8); barSpot.target.position.set(2,2,-10.5);
scene.add(barSpot); scene.add(barSpot.target);

// atrium glow from below
const atriumGlow=new THREE.PointLight('#FF6818',2.0,6);
atriumGlow.position.set(AX,-0.5,AZ);
scene.add(atriumGlow);

// ─────────────────────────────────────────────────────────────────────
// FLOOR — narrow planks (uPlank 0.12 ≈ 12 cm real width)
// ─────────────────────────────────────────────────────────────────────
const woodMat=new THREE.ShaderMaterial({
  uniforms:{
    uBase:{value:new THREE.Color('#C8A46A')},
    uDark:{value:new THREE.Color('#8B6535')},
    uPlank:{value:0.13},       // ← was 0.55, now narrow planks
    uFreq:{value:55.0},
    uStr:{value:0.14},
  },
  vertexShader:`
    varying vec3 vP;
    void main(){vP=position;gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.);}
  `,
  fragmentShader:`
    uniform vec3 uBase,uDark;uniform float uPlank,uFreq,uStr;
    varying vec3 vP;
    float rand(vec2 c){return fract(sin(dot(c,vec2(127.1,311.7)))*43758.5453);}
    void main(){
      float pi=floor(vP.x/uPlank);
      float po=rand(vec2(pi,0.));
      float pd=rand(vec2(pi,1.))*0.12;
      float g=sin((vP.z+po*3.)*uFreq)*uStr+sin((vP.z+po*1.5)*uFreq*.4)*uStr*.5;
      g=g*.5+.5;
      float s=smoothstep(0.,.018,fract(vP.x/uPlank))*smoothstep(1.,.982,fract(vP.x/uPlank));
      vec3 col=mix(uDark,uBase,g)-pd;
      col*=s*.82+.18;
      gl_FragColor=vec4(col,1.);
    }
  `,
});
const floorMesh=new THREE.Mesh(new THREE.PlaneGeometry(ROOM_W,ROOM_L,120,120),woodMat);
floorMesh.rotateX(-Math.PI/2); floorMesh.position.y=0.01;
scene.add(floorMesh);
const baseMesh=new THREE.Mesh(new THREE.PlaneGeometry(ROOM_W+2,ROOM_L+2),
  new THREE.MeshStandardMaterial({color:'#2A1208'}));
baseMesh.rotateX(-Math.PI/2); scene.add(baseMesh);

// ─────────────────────────────────────────────────────────────────────
// VAULT — barrel ceiling with transverse arch ribs + string lights
// ─────────────────────────────────────────────────────────────────────
(function(){
  const r=ROOM_W/2;
  const brickMat=new THREE.MeshStandardMaterial({
    color:'#8B4A2F',roughness:0.9,metalness:0.0,side:THREE.BackSide,
  });
  const ribMat=new THREE.MeshStandardMaterial({color:'#7A3F28',roughness:0.88});

  // barrel shell
  const shape=new THREE.Shape();
  for(let i=0;i<=64;i++){
    const t=(i/64)*Math.PI;
    i===0?shape.moveTo(-r*Math.cos(t),r*Math.sin(t)*(ARCH_H/r)):shape.lineTo(-r*Math.cos(t),r*Math.sin(t)*(ARCH_H/r));
  }
  shape.lineTo(r,0); shape.lineTo(-r,0);
  const vGeo=new THREE.ExtrudeGeometry(shape,{depth:ROOM_L,bevelEnabled:false});
  vGeo.rotateX(Math.PI/2); vGeo.translate(0,0,ROOM_L/2);

  // vertex colour variation across brick
  const pos=vGeo.attributes.position;
  const cols=new Float32Array(pos.count*3);
  const pal=['#8B4A2F','#A05530','#7A3C25','#B06040','#954030'].map(c=>new THREE.Color(c));
  for(let i=0;i<pos.count;i++){
    const c=pal[Math.floor(Math.random()*pal.length)];
    cols[i*3]=c.r;cols[i*3+1]=c.g;cols[i*3+2]=c.b;
  }
  vGeo.setAttribute('color',new THREE.BufferAttribute(cols,3));
  brickMat.vertexColors=true;
  scene.add(new THREE.Mesh(vGeo,brickMat));

  // arch ribs + string lights
  const sp=ROOM_L/(ARCH_COUNT-1);
  for(let i=0;i<ARCH_COUNT;i++){
    const z=-ROOM_L/2+i*sp;
    const pts=[];
    for(let j=0;j<=32;j++){
      const t=(j/32)*Math.PI;
      pts.push(new THREE.Vector3(-r*Math.cos(t),r*Math.sin(t)*(ARCH_H/r),z));
    }
    scene.add(new THREE.Mesh(
      new THREE.TubeGeometry(new THREE.CatmullRomCurve3(pts),32,0.18,8,false),
      ribMat,
    ));
    // string lights — every 2nd point along arch
    for(let j=0;j<=20;j+=2){
      const t=(j/20)*Math.PI;
      const bx=-r*Math.cos(t), by=r*Math.sin(t)*(ARCH_H/r)-0.12;
      const bulb=new THREE.Mesh(new THREE.SphereGeometry(.045,6,6),
        new THREE.MeshStandardMaterial({emissive:'#FFE080',emissiveIntensity:4,color:'#FFF5C8'}));
      bulb.position.set(bx,by,z); scene.add(bulb);
      if(j%4===0){
        const pl=new THREE.PointLight('#FF9A3C',1.0,5.5);
        pl.position.set(bx,by-.1,z); scene.add(pl);
      }
    }
  }
})();

// ─────────────────────────────────────────────────────────────────────
// WALLS — brick + arched niches with candles
// ─────────────────────────────────────────────────────────────────────
const mkBrick=()=>new THREE.MeshStandardMaterial({color:'#7A3C25',roughness:0.93,metalness:0});
const nicheMat=new THREE.MeshStandardMaterial({color:'#5A2E18',roughness:0.97,side:THREE.BackSide});

// back + front solid walls
const bw=new THREE.Mesh(new THREE.PlaneGeometry(ROOM_W,WALL_H),mkBrick());
bw.position.set(0,WALL_H/2,-ROOM_L/2); scene.add(bw);
const fw=new THREE.Mesh(new THREE.PlaneGeometry(ROOM_W,WALL_H),mkBrick());
fw.position.set(0,WALL_H/2,ROOM_L/2); fw.rotation.y=Math.PI; scene.add(fw);

function buildSideWall(xPos,dir){
  const NC=3,NW=1.4,NH=2.2,ND=0.6;
  const sp=ROOM_L/(NC+1), mat=mkBrick();
  for(let i=0;i<NC;i++){
    const z=-ROOM_L/2+sp*(i+1), pw=sp-NW;
    if(pw>.2){
      [-1,1].forEach(s=>{
        const p=new THREE.Mesh(new THREE.PlaneGeometry(pw*.88,WALL_H),mat);
        p.position.set(xPos,WALL_H/2,z+s*(NW/2+pw*.44));
        p.rotation.y=dir>0?Math.PI/2:-Math.PI/2; scene.add(p);
      });
    }
    // niche back/sides/arch
    const nb=new THREE.Mesh(new THREE.PlaneGeometry(NW,NH),nicheMat);
    nb.position.set(xPos-dir*ND,NH/2+.1,z);
    nb.rotation.y=dir>0?Math.PI/2:-Math.PI/2; scene.add(nb);
    [-1,1].forEach(s=>{
      const ns=new THREE.Mesh(new THREE.PlaneGeometry(ND,NH),nicheMat);
      ns.position.set(xPos-dir*ND/2,NH/2+.1,z+s*NW/2);
      ns.rotation.y=s*dir>0?0:Math.PI; scene.add(ns);
    });
    const ag=new THREE.CylinderGeometry(NW/2,NW/2,ND,16,1,true,0,Math.PI);
    ag.rotateZ(Math.PI/2); ag.rotateY(dir>0?Math.PI/2:-Math.PI/2);
    const am=new THREE.Mesh(ag,nicheMat);
    am.position.set(xPos-dir*ND/2,NH+.1,z); scene.add(am);
    // candle + flame light
    scene.add(Object.assign(new THREE.Mesh(
      new THREE.CylinderGeometry(.04,.04,.25,8),
      new THREE.MeshStandardMaterial({color:'#E8D5B0'})),
    {position:new THREE.Vector3(xPos-dir*(ND-.05),NH*.25,z)}));
    const fl=new THREE.PointLight('#FF8020',1.2,3.0);
    fl.position.set(xPos-dir*(ND-.05),NH*.25+.2,z);
    fl.userData={base:1.2,speed:3+Math.random()*2,phase:Math.random()*Math.PI*2};
    scene.add(fl);
  }
  // top strip above niches
  const ts=new THREE.Mesh(new THREE.PlaneGeometry(ROOM_L,WALL_H-NH-.3),mat);
  ts.position.set(xPos,WALL_H-(WALL_H-NH-.3)/2,0);
  ts.rotation.y=dir>0?Math.PI/2:-Math.PI/2; scene.add(ts);
}
buildSideWall(-ROOM_W/2, 1);
buildSideWall( ROOM_W/2,-1);

// ─────────────────────────────────────────────────────────────────────
// ATRIUM — sunken cellar opening
// ─────────────────────────────────────────────────────────────────────
const atriumWall=new THREE.Mesh(
  new THREE.CylinderGeometry(ATRIUM_R,ATRIUM_R,ATRIUM_DEPTH,48,1,true),
  new THREE.MeshStandardMaterial({color:'#5A2E18',roughness:.97,side:THREE.BackSide}),
);
atriumWall.position.set(AX,-(ATRIUM_DEPTH/2)-.05,AZ); scene.add(atriumWall);
const lf=new THREE.Mesh(new THREE.CircleGeometry(ATRIUM_R,48),
  new THREE.MeshStandardMaterial({color:'#4A2810',roughness:.95}));
lf.rotation.x=-Math.PI/2; lf.position.set(AX,-ATRIUM_DEPTH-.05,AZ); scene.add(lf);

// lower dining tables
[[-.8,-.5],[.5,.4],[-.3,.9]].forEach(([tx,tz])=>{
  const ty=-ATRIUM_DEPTH+.03;
  const tbl=new THREE.Mesh(new THREE.CylinderGeometry(.45,.45,.05,16),
    new THREE.MeshStandardMaterial({color:'#E8D5B0',roughness:.6}));
  tbl.position.set(AX+tx,ty+.72,AZ+tz); scene.add(tbl);
  const leg=new THREE.Mesh(new THREE.CylinderGeometry(.04,.04,.7,8),
    new THREE.MeshStandardMaterial({color:'#3D2010'}));
  leg.position.set(AX+tx,ty+.35,AZ+tz); scene.add(leg);
  const cf=new THREE.PointLight('#FF7010',.8,1.5);
  cf.position.set(AX+tx,ty+.85,AZ+tz);
  cf.userData={base:.8,speed:4+Math.random()*2,phase:Math.random()*Math.PI*2};
  scene.add(cf);
});
const caveL=new THREE.PointLight('#FF9A3C',2.0,ATRIUM_DEPTH*1.4);
caveL.position.set(AX,-ATRIUM_DEPTH+1,AZ); scene.add(caveL);

// ─────────────────────────────────────────────────────────────────────
// GLASS RAILING — fixed material + correct positioning
// ─────────────────────────────────────────────────────────────────────
const brassMat=new THREE.MeshStandardMaterial({
  color:'#C8A060',roughness:0.15,metalness:0.95,envMapIntensity:1.5,
});

// Glass: drop physical transmission (needs full env), use standard transparent
// warm amber tint matching reference photo
const glassMat=new THREE.MeshStandardMaterial({
  color:'#D4B87A',          // warm amber tint
  transparent:true,
  opacity:0.28,
  roughness:0.04,
  metalness:0.0,
  side:THREE.DoubleSide,
  depthWrite:false,
});

const POST_COUNT=32, PANEL_COUNT=24, RAIL_H=0.95;

// top + bottom brass handrails
[0,RAIL_H].forEach(yo=>{
  const pts=[];
  for(let i=0;i<=80;i++){
    const a=(i/80)*Math.PI*2;
    pts.push(new THREE.Vector3(AX+Math.cos(a)*ATRIUM_R, yo, AZ+Math.sin(a)*ATRIUM_R));
  }
  scene.add(new THREE.Mesh(
    new THREE.TubeGeometry(new THREE.CatmullRomCurve3(pts,true),80,.028,8,true),
    brassMat,
  ));
});

// glass panels — each is a flat quad tangent to the ring
for(let i=0;i<PANEL_COUNT;i++){
  const a0=(i/PANEL_COUNT)*Math.PI*2;
  const a1=((i+1)/PANEL_COUNT)*Math.PI*2;
  const aMid=(a0+a1)/2;
  const arcLen=ATRIUM_R*(a1-a0)*0.9;

  const px=AX+Math.cos(aMid)*ATRIUM_R;
  const pz=AZ+Math.sin(aMid)*ATRIUM_R;

  const pane=new THREE.Mesh(new THREE.PlaneGeometry(arcLen,RAIL_H*.88), glassMat);
  pane.position.set(px, RAIL_H/2, pz);
  // rotate so the plane faces radially outward (tangent = perpendicular to radius)
  pane.rotation.y = Math.PI/2 - aMid;
  scene.add(pane);
}

// brass posts + caps
for(let i=0;i<POST_COUNT;i++){
  const a=(i/POST_COUNT)*Math.PI*2;
  const px=AX+Math.cos(a)*ATRIUM_R, pz=AZ+Math.sin(a)*ATRIUM_R;
  const post=new THREE.Mesh(new THREE.CylinderGeometry(.022,.022,RAIL_H,8),brassMat);
  post.position.set(px,RAIL_H/2,pz); scene.add(post);
  const cap=new THREE.Mesh(new THREE.SphereGeometry(.032,8,8),brassMat);
  cap.position.set(px,RAIL_H+.032,pz); scene.add(cap);
}

// ─────────────────────────────────────────────────────────────────────
// BOTTLE LABEL TEXTURES
// ─────────────────────────────────────────────────────────────────────
const WINE_NAMES=[
  ['BL','UNCORKED','Reserve','2019'],
  ['CAVE','NOIR','Grand Cru','2017'],
  ['VOLTA','ROUGE','Barrel Select','2021'],
  ['ARCO','BIANCO','Aged 24 mo.','2020'],
  ['BRAINLABS','CELLAR','Limited','2018'],
];
const PALETTES=[
  {bg:'#F5ECD7',text:'#2A1608',accent:'#8B1A1A',line:'#C8A46A'},
  {bg:'#1A2A1A',text:'#E8D5A0',accent:'#C8A46A',line:'#4A6A4A'},
  {bg:'#EDE0C8',text:'#1C0F08',accent:'#4A2A0A',line:'#8B6535'},
  {bg:'#F0EAE0',text:'#2A1A08',accent:'#2A3A5A',line:'#6A5A4A'},
  {bg:'#2A1A14',text:'#E8D5B0',accent:'#C87050',line:'#6A3A28'},
];
function mkLabel(nm,pal){
  const W=128,H=64,cv=document.createElement('canvas');
  cv.width=W; cv.height=H;
  const c=cv.getContext('2d');
  c.fillStyle=pal.bg; c.fillRect(0,0,W,H);
  c.strokeStyle=pal.line; c.lineWidth=1.5; c.strokeRect(4,4,W-8,H-8);
  c.lineWidth=.5; c.strokeRect(6,6,W-12,H-12);
  c.fillStyle=pal.accent; c.fillRect(12,10,W-24,2);
  c.fillStyle=pal.text; c.font='bold 11px Georgia,serif'; c.textAlign='center';
  c.fillText(nm[0],W/2,26);
  c.font='8px Georgia,serif'; c.fillText(nm[1],W/2,36);
  c.fillStyle=pal.accent; c.font='italic 7px Georgia,serif'; c.fillText(nm[2],W/2,46);
  c.fillStyle=pal.text; c.font='6px Georgia,serif'; c.fillText(nm[3],W/2,56);
  c.fillStyle=pal.accent; c.fillRect(12,H-12,W-24,1);
  const t=new THREE.CanvasTexture(cv); t.needsUpdate=true; return t;
}

// ─────────────────────────────────────────────────────────────────────
// BAR — shelving, bottles, labels, windows
// ─────────────────────────────────────────────────────────────────────
const BZ=-10.8;
scene.add(Object.assign(
  new THREE.Mesh(new THREE.BoxGeometry(6,1.05,.65),
    new THREE.MeshStandardMaterial({color:'#3D2010',roughness:.4,metalness:.1})),
  {position:new THREE.Vector3(2,.525,BZ+.35)}));
scene.add(Object.assign(
  new THREE.Mesh(new THREE.BoxGeometry(6.1,.06,.75),
    new THREE.MeshStandardMaterial({color:'#C8A46A',roughness:.25,metalness:.05})),
  {position:new THREE.Vector3(2,1.08,BZ+.35)}));

const SHELF_W=5.5, glassCols=['#1A3A1A','#4A2A0A','#8B1A1A','#2A3A4A','#3A2A1A'];
for(let si=0;si<4;si++){
  const sy=1.3+si*.55;
  scene.add(Object.assign(
    new THREE.Mesh(new THREE.BoxGeometry(SHELF_W,.04,.3),
      new THREE.MeshStandardMaterial({color:'#2A1008',roughness:.7})),
    {position:new THREE.Vector3(2,sy,BZ+.04)}));

  const bCount=Math.floor(SHELF_W/.12);
  for(let bi=0;bi<bCount;bi++){
    const bx=2-SHELF_W/2+bi*.12+.06;
    const col=glassCols[(si*7+bi)%glassCols.length];
    const gm=new THREE.MeshStandardMaterial({color:col,roughness:.15,metalness:.1,transparent:true,opacity:.88});
    const bot=new THREE.Mesh(new THREE.CylinderGeometry(.033,.038,.28,10),gm);
    bot.position.set(bx,sy+.15,BZ+.06); scene.add(bot);
    const nk=new THREE.Mesh(new THREE.CylinderGeometry(.016,.033,.1,8),gm);
    nk.position.set(bx,sy+.33,BZ+.06); scene.add(nk);
    if(bi%2===0){
      const ni=(si+Math.floor(bi/2))%WINE_NAMES.length;
      const lm=new THREE.MeshStandardMaterial({
        map:mkLabel(WINE_NAMES[ni],PALETTES[ni%PALETTES.length]),
        roughness:.6,polygonOffset:true,polygonOffsetFactor:-1,
      });
      const lbl=new THREE.Mesh(new THREE.PlaneGeometry(.062,.038),lm);
      lbl.position.set(bx,sy+.14,BZ+.1); scene.add(lbl);
    }
    const fm=new THREE.MeshStandardMaterial({
      color:['#1A1A1A','#8B1A1A','#C8A060','#1A3A1A'][(si+bi)%4],roughness:.3,metalness:.55,
    });
    scene.add(Object.assign(
      new THREE.Mesh(new THREE.CylinderGeometry(.018,.018,.025,8),fm),
      {position:new THREE.Vector3(bx,sy+.39,BZ+.06)}));
  }
}
// backlit emissive panel behind bottles
const blPanel=new THREE.Mesh(new THREE.PlaneGeometry(SHELF_W,2.5),
  new THREE.MeshStandardMaterial({color:'#FFF3C4',emissive:'#FFD070',emissiveIntensity:1.0}));
blPanel.position.set(2,2.2,BZ-.01); scene.add(blPanel);
const barPL=new THREE.PointLight('#FFF3C4',2.5,10);
barPL.position.set(2,2.8,BZ+1.5); scene.add(barPL);

// industrial windows
const frMat=new THREE.MeshStandardMaterial({color:'#1C1C1C',roughness:.6,metalness:.45});
const wgMat=new THREE.MeshStandardMaterial({color:'#6A8A9A',transparent:true,opacity:.3,roughness:.08});
[[-3.5,2.0],[7.0,2.0]].forEach(([wx,wy])=>{
  scene.add(Object.assign(new THREE.Mesh(new THREE.BoxGeometry(1.9,1.5,.08),frMat),
    {position:new THREE.Vector3(wx,wy,BZ+.01)}));
  scene.add(Object.assign(new THREE.Mesh(new THREE.PlaneGeometry(1.8,1.4),wgMat),
    {position:new THREE.Vector3(wx,wy,BZ+.06)}));
  ['h','v'].forEach(d=>{
    scene.add(Object.assign(
      new THREE.Mesh(d==='h'?new THREE.BoxGeometry(1.8,.05,.06):new THREE.BoxGeometry(.05,1.4,.06),frMat),
      {position:new THREE.Vector3(wx,wy,BZ+.055)}));
  });
});

// ─────────────────────────────────────────────────────────────────────
// FIRST-PERSON WALK
// ─────────────────────────────────────────────────────────────────────
const BOUNDS={minX:-6,maxX:6,minZ:-10.5,maxZ:10.5};
const EYE=1.68,WSPEED=4.5,LSENS=0.0018;
let fpActive=false,fpYaw=0,fpPitch=0;
const fpKeys={};
const fpEuler=new THREE.Euler(0,0,0,'YXZ');

document.addEventListener('keydown',e=>{fpKeys[e.code]=true;});
document.addEventListener('keyup',  e=>{fpKeys[e.code]=false;});
document.addEventListener('mousemove',e=>{
  if(!fpActive) return;
  fpYaw  -=e.movementX*LSENS;
  fpPitch-=e.movementY*LSENS;
  fpPitch=Math.max(-Math.PI*.42,Math.min(Math.PI*.42,fpPitch));
  fpEuler.set(fpPitch,fpYaw,0);
  camera.quaternion.setFromEuler(fpEuler);
});
document.addEventListener('pointerlockchange',()=>{
  fpActive=document.pointerLockElement===renderer.domElement;
  updateUI();
});
function enterFP(){
  const d=new THREE.Vector3(); camera.getWorldDirection(d);
  fpYaw=Math.atan2(d.x,d.z)+Math.PI; fpPitch=Math.asin(-d.y);
  camera.position.y=EYE; orbit.enabled=false;
  renderer.domElement.requestPointerLock();
}
function exitFP(){
  document.exitPointerLock(); orbit.enabled=true; fpActive=false; updateUI();
}
function updateUI(){
  document.getElementById('ui').textContent=fpActive
    ?'WASD to walk · Mouse to look · ESC to exit'
    :'Drag to explore · Scroll to zoom';
  document.getElementById('modeBtn').textContent=fpActive?'Orbit Mode':'Walk Mode';
}
function updateFP(dt){
  if(!fpActive) return;
  const fwd=Number(fpKeys['KeyW']||fpKeys['ArrowUp'])-Number(fpKeys['KeyS']||fpKeys['ArrowDown']);
  const str=Number(fpKeys['KeyD']||fpKeys['ArrowRight'])-Number(fpKeys['KeyA']||fpKeys['ArrowLeft']);
  const mv=new THREE.Vector3(str,0,-fwd);
  if(mv.length()>0) mv.normalize().applyEuler(new THREE.Euler(0,fpYaw,0)).multiplyScalar(WSPEED*dt);
  camera.position.add(mv);
  camera.position.x=Math.max(BOUNDS.minX,Math.min(BOUNDS.maxX,camera.position.x));
  camera.position.z=Math.max(BOUNDS.minZ,Math.min(BOUNDS.maxZ,camera.position.z));
  camera.position.y=EYE;
}
document.getElementById('modeBtn').addEventListener('click',()=>fpActive?exitFP():enterFP());
document.addEventListener('keydown',e=>{if(e.code==='Escape'&&fpActive)exitFP();});

// ─────────────────────────────────────────────────────────────────────
// RESIZE + RENDER LOOP
// ─────────────────────────────────────────────────────────────────────
window.addEventListener('resize',()=>{
  camera.aspect=innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
  composer.setSize(innerWidth,innerHeight);
});

const clock=new THREE.Clock(); let elapsed=0;
function animate(){
  requestAnimationFrame(animate);
  const dt=clock.getDelta(); elapsed+=dt;
  if(!fpActive) orbit.update();
  updateFP(dt);
  scene.traverse(o=>{
    if(o.isPointLight&&o.userData.base!==undefined)
      o.intensity=o.userData.base+Math.sin(elapsed*o.userData.speed+o.userData.phase)*.18;
  });
  composer.render();
}

// ─── loader ───────────────────────────────────────────────────────────
const loaderEl=document.getElementById('loader');
const fillEl=document.getElementById('fill');
let si=0; const steps=[10,25,40,55,70,85,95,100];
const iv=setInterval(()=>{ if(si<steps.length) fillEl.style.width=steps[si++]+'%'; else clearInterval(iv); },80);
setTimeout(()=>{ loaderEl.style.opacity='0'; setTimeout(()=>loaderEl.remove(),900); },900);

animate();
</script>
